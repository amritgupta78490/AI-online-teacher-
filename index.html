<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Teacher - Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           GLOBAL & VARIABLES
           ========================================== */
        :root {
            --bg-color: #FFFFFF;
            --surface-color: rgba(255, 255, 255, 0.85);
            --surface-solid: #FFFFFF;
            --text-main: #1D1D1F;
            --text-muted: #86868B;
            --accent-color: #0066CC;
            --accent-glow: rgba(0, 102, 204, 0.1);
            --danger: #FF3B30;
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
            --border-radius-sm: 12px;
            --transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .glass {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }

        /* ==========================================
           LAYOUT MAIN
           ========================================== */
        .app-layout {
            display: flex; flex-direction: column; width: 100%;
            max-width: 1200px; margin: 0 auto; padding: 16px; gap: 16px;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 20px; border-radius: var(--border-radius-lg); z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }

        .live-badge {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255, 59, 48, 0.1); color: var(--danger);
            padding: 4px 12px; border-radius: 20px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
        }

        .live-dot {
            width: 6px; height: 6px; background: var(--danger); border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 59, 48, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .teacher-info h1 { font-size: 16px; font-weight: 600; }
        .teacher-info p { font-size: 12px; color: var(--text-muted); }

        .header-right { display: flex; align-items: center; gap: 12px; }
        
        .mode-indicator {
            font-size: 11px; font-weight: 600; color: var(--accent-color);
            background: var(--accent-glow); padding: 6px 12px; border-radius: 12px;
        }

        /* ==========================================
           VIDEO SECTION
           ========================================== */
        .video-section {
            width: 100%; height: 55vh; min-height: 340px;
            display: flex; justify-content: center; align-items: center;
        }

        .canvas-wrapper {
            position: relative; width: 100%; height: 100%;
            border-radius: var(--border-radius-lg); overflow: hidden;
            background: #FFFFFF; border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.03);
        }
        
        #canvas-container { width: 100%; height: 100%; display: block; }

        #loader {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: #FFFFFF; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20;
            transition: opacity 0.3s ease;
        }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #f0f0f5; border-top: 3px solid var(--accent-color);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        #lesson-panel {
            position: absolute; bottom: 16px; left: 50%;
            transform: translateX(-50%) translateY(130%);
            width: 92%; max-width: 550px; border-radius: var(--border-radius-md);
            background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.08);
            display: flex; flex-direction: column; opacity: 0;
            transition: var(--transition); z-index: 10; max-height: 150px;
        }

        .canvas-wrapper.teaching-mode #lesson-panel {
            transform: translateX(-50%) translateY(0); opacity: 1;
        }

        .lesson-header {
            padding: 10px 14px; border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }

        .lesson-header h3 {
            font-size: 11px; font-weight: 700; color: var(--accent-color);
            text-transform: uppercase; display: flex; align-items: center; gap: 6px;
        }

        .btn-close-lesson {
            background: #f0f0f5; border: none; width: 20px; height: 20px;
            border-radius: 50%; font-size: 12px; cursor: pointer; color: var(--text-muted);
        }

        .lesson-body { flex-grow: 1; padding: 12px; overflow-y: auto; }
        .teaching-card { font-size: 13.5px; line-height: 1.5; color: var(--text-main); }

        /* ==========================================
           INTERACTION & CONTROLS AREA
           ========================================== */
        .interaction-area {
            display: flex; flex-direction: column; gap: 12px;
            max-width: 900px; width: 100%; margin: 0 auto;
        }

        .controls-bar {
            display: flex; justify-content: center; gap: 14px;
            padding: 8px; border-radius: var(--border-radius-lg);
        }

        .icon-btn {
            background: var(--surface-solid); border: 1px solid rgba(0,0,0,0.05);
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; color: var(--text-main); transition: all 0.3s;
        }

        .icon-btn:hover { transform: translateY(-2px); }
        .icon-btn svg { width: 18px; height: 18px; fill: currentColor; }
        .icon-btn.active-state { background: var(--text-main); color: white; }

        /* New Mic Button Styles */
        .mic-btn-container {
            display: flex; justify-content: center; align-items: center;
            margin-top: 10px; margin-bottom: 10px;
        }

        .mic-btn {
            background: var(--accent-color); color: white; border: none;
            padding: 14px 32px; border-radius: 30px; font-size: 16px; font-weight: 600;
            cursor: pointer; box-shadow: 0 8px 20px var(--accent-glow);
            display: flex; align-items: center; gap: 10px; transition: all 0.3s;
        }

        .mic-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(0, 102, 204, 0.3); }
        .mic-btn.listening { background: var(--danger); animation: pulse-mic 1.5s infinite; }
        .mic-btn svg { width: 20px; height: 20px; fill: currentColor; }

        @keyframes pulse-mic {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .chat-display {
            padding: 12px 16px; border-radius: var(--border-radius-lg);
            min-height: 54px; max-height: 74px; overflow-y: auto; font-size: 13.5px;
        }

        .ai-label {
            font-size: 10px; font-weight: 700; color: var(--accent-color);
            text-transform: uppercase; margin-bottom: 2px; display: flex; align-items: center; gap: 6px;
        }

        /* Waveform Animation */
        .waveform { display: flex; align-items: center; gap: 2px; height: 10px; }
        .bar {
            width: 2px; background-color: var(--text-muted); border-radius: 2px;
            transition: height 0.1s ease; height: 20%;
        }
        .waveform.speaking .bar { background-color: var(--accent-color); }

        @media (max-width: 768px) {
            .app-layout { padding: 12px; gap: 12px; }
            .video-section { height: 48vh; }
            #lesson-panel { width: 94%; bottom: 12px; }
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div class="app-layout">
        <header class="glass">
            <div class="header-left">
                <div class="live-badge"><div class="live-dot"></div> LIVE</div>
                <div class="teacher-info">
                    <h1>Dr. Nova</h1>
                    <p>AI EdTech Platform</p>
                </div>
            </div>
            <div class="header-right">
                <span class="mode-indicator" id="ui-mode-badge">IDLE MODE</span>
            </div>
        </header>

        <section class="video-section">
            <div class="canvas-wrapper" id="video-wrapper">
                <div id="loader">
                    <div class="spinner"></div>
                    <div id="loading-status" style="font-size: 13px; color: #666; font-weight: 500;">Loading Virtual Teacher...</div>
                </div>
                <div id="canvas-container"></div>
                <div id="lesson-panel">
                    <div class="lesson-header">
                        <h3><div class="live-dot" style="background:var(--accent-color);"></div> AI Explanation</h3>
                        <button class="btn-close-lesson" id="btn-close-lesson" title="Clear">&times;</button>
                    </div>
                    <div class="lesson-body" id="lesson-body"></div>
                </div>
            </div>
        </section>

        <section class="interaction-area">
            <div class="controls-bar glass">
                <button class="icon-btn" id="btn-fullscreen" title="Fullscreen Class">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
                <button class="icon-btn active-state" id="btn-rotate" title="Toggle Auto-Rotate">
                    <svg viewBox="0 0 24 24"><path d="M15.55 5.55L11 1v3C7.06 4 4 7.06 4 11s3.06 7 7 7v-2c-2.76 0-5-2.24-5-5s2.24-5 5-5v3l4.55-4.45zM19.93 11c-.17-1.39-.72-2.73-1.62-3.89l-1.42 1.42c.54.75.88 1.6 1.02 2.47h2.02zM13 17.9v2.02c1.39-.17 2.74-.71 3.9-1.61l-1.44-1.44c-.75.54-1.59.89-2.46 1.03zm3.44-2.43l1.41 1.41c.91-1.16 1.46-2.51 1.63-3.9h-2.02c-.14.87-.48 1.72-1.02 2.49z"/></svg>
                </button>
            </div>

            <div class="mic-btn-container">
                <button class="mic-btn" id="btn-mic">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
                    Tap to Speak
                </button>
            </div>

            <div class="chat-display glass">
                <div class="ai-label">
                    <span id="status-text">SYSTEM READY</span> 
                    <div class="waveform" id="audio-wave">
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    </div>
                </div>
                <p id="chat-text" style="color: var(--text-muted);">Press the mic button and ask me anything...</p>
            </div>
        </section>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        /* ==========================================
           API KEY SYSTEM CONFIGURATION
           ========================================== */
        const GEMINI_API_KEY = "AIzaSyBs98KNxQXkgphbhF3_iDY2d66kQVxoekk";
        const GEMINI_MODEL = "gemini-2.5-flash-preview-tts"; 

        /* ==========================================
           1. THREE.JS ENVIRONMENT SETUP
           ========================================== */
        let scene, camera, renderer, controls, clock, modelGroup;
        
        let jawBone = null; 
        let bodyBones = { spine: null, neck: null, head: null, leftArm: null, rightArm: null, leftForeArm: null, rightForeArm: null };
        const initialBoneRotations = new Map();
        
        const container = document.getElementById('canvas-container');
        const wrapper = document.getElementById('video-wrapper');
        const loaderUI = document.getElementById('loader');
        const loadingStatus = document.getElementById('loading-status');

        let isTeachingMode = false;
        let isSpeaking = false;
        let mouthOpenIntensity = 0;
        
        // Human-like Teaching Poses System
        const poses = [
            { lArmZ: 0.3, rArmZ: -0.3, lForeX: -0.5, rForeX: -0.5, spineY: 0.1, neckX: 0.05 }, // Open hands explaining
            { lArmZ: 0.1, rArmZ: -0.4, lForeX: -0.1, rForeX: -0.8, spineY: -0.1, neckX: 0.0 }, // Right hand active
            { lArmZ: 0.4, rArmZ: -0.1, lForeX: -0.8, rForeX: -0.1, spineY: 0.05, neckX: -0.05 }, // Left hand active
            { lArmZ: 0.1, rArmZ: -0.1, lForeX: -0.2, rForeX: -0.2, spineY: 0.0, neckX: 0.1 }   // Leaning forward slightly
        ];
        
        let currentPoseTarget = { ...poses[0] };
        let lastPoseChangeTime = 0;

        // Web Audio API Variables for REAL-TIME Lip Sync
        let audioCtx, analyser, dataArray;
        let aiAudioElement = null;

        const absoluteCenterTarget = new THREE.Vector3(0, 1.1, 0);
        const uiModeBadge = document.getElementById('ui-mode-badge');

        init3D();
        animate3D();

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff); 
            clock = new THREE.Clock();

            const aspect = container.clientWidth / container.clientHeight;
            camera = new THREE.PerspectiveCamera(42, aspect, 0.1, 100);
            updateCameraPosition();

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.4);
            scene.add(ambientLight);

            const keyLight = new THREE.DirectionalLight(0xffffff, 1.6);
            keyLight.position.set(1, 3, 3);
            scene.add(keyLight);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.minDistance = 1.0;
            controls.maxDistance = 25; 
            controls.enablePan = false;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.4;
            controls.target.copy(absoluteCenterTarget);

            modelGroup = new THREE.Group();
            scene.add(modelGroup);

            const loader = new GLTFLoader();
            loader.load('./teacher.glb', function (gltf) {
                const model = gltf.scene;

                model.traverse((child) => {
                    if (child.isMesh && child.material) {
                        child.material.roughness = 0.5; child.material.metalness = 0.0;
                    }
                    if (child.isBone) {
                        initialBoneRotations.set(child.uuid, child.rotation.clone());
                        const name = child.name.toLowerCase();
                        if (name.includes('jaw') || name.includes('mouth')) jawBone = child;
                        else if (name.includes('spine') || name.includes('chest')) bodyBones.spine = child;
                        else if (name.includes('neck')) bodyBones.neck = child;
                        else if (name.includes('head')) bodyBones.head = child;
                        else if (name.includes('leftarm') || name.includes('left_arm')) bodyBones.leftArm = child;
                        else if (name.includes('rightarm') || name.includes('right_arm')) bodyBones.rightArm = child;
                        else if (name.includes('leftforearm')) bodyBones.leftForeArm = child;
                        else if (name.includes('rightforearm')) bodyBones.rightForeArm = child;
                    }
                });

                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const scale = 2.2 / (size.y || 1);
                model.scale.set(scale, scale, scale);
                const center = new THREE.Box3().setFromObject(model).getCenter(new THREE.Vector3());
                model.position.set(-center.x, -center.y - 0.5, -center.z);
                
                modelGroup.add(model);
                loaderUI.style.opacity = '0';
                setTimeout(() => loaderUI.style.display = 'none', 300);
            });

            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                updateCameraPosition();
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
        }

        function updateCameraPosition() {
            camera.position.set(0, 1.2, container.clientWidth < 768 ? 12.65 : 10.95);
        }

        // Setup Web Audio Context for processing real-time audio frequencies
        function initAudioAnalyzer() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256; 
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            const time = clock.getElapsedTime();
            controls.target.lerp(absoluteCenterTarget, 0.1);

            if (modelGroup && modelGroup.children.length > 0) {
                const breath = Math.sin(time * 1.5) * 0.015;

                if (isSpeaking && analyser) {
                    // --- REAL-TIME AUDIO FREQUENCY LIP SYNC ---
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    // Focus on vocal frequencies (lower half of bins)
                    const limit = Math.floor(dataArray.length / 2);
                    for (let i = 0; i < limit; i++) {
                        sum += dataArray[i];
                    }
                    let avgVolume = sum / limit;
                    
                    // Map volume (0-255) to mouth intensity (0.0 to 1.0)
                    let audioIntensity = (avgVolume / 180.0);
                    // Smooth the mouth movement slightly
                    mouthOpenIntensity = THREE.MathUtils.lerp(mouthOpenIntensity, audioIntensity, 0.6);

                    // Update UI Waveform
                    const bars = document.querySelectorAll('.waveform .bar');
                    bars.forEach((bar, index) => {
                        let vol = dataArray[index * 3] || 0;
                        bar.style.height = Math.max(20, (vol / 255) * 100) + '%';
                    });

                    // --- HUMAN-LIKE BODY & HAND GESTURES ---
                    if (time - lastPoseChangeTime > 2.0 + Math.random()) {
                        lastPoseChangeTime = time;
                        currentPoseTarget = poses[Math.floor(Math.random() * poses.length)];
                    }

                    modelGroup.position.y = (Math.sin(time * 2) * 0.005) - 0.5; 

                    // Smooth blending to target human pose
                    const lerpSpeed = 0.04;
                    if(bodyBones.leftArm) bodyBones.leftArm.rotation.z = THREE.MathUtils.lerp(bodyBones.leftArm.rotation.z, initialBoneRotations.get(bodyBones.leftArm.uuid).z + currentPoseTarget.lArmZ, lerpSpeed);
                    if(bodyBones.rightArm) bodyBones.rightArm.rotation.z = THREE.MathUtils.lerp(bodyBones.rightArm.rotation.z, initialBoneRotations.get(bodyBones.rightArm.uuid).z + currentPoseTarget.rArmZ, lerpSpeed);
                    if(bodyBones.leftForeArm) bodyBones.leftForeArm.rotation.x = THREE.MathUtils.lerp(bodyBones.leftForeArm.rotation.x, initialBoneRotations.get(bodyBones.leftForeArm.uuid).x + currentPoseTarget.lForeX, lerpSpeed);
                    if(bodyBones.rightForeArm) bodyBones.rightForeArm.rotation.x = THREE.MathUtils.lerp(bodyBones.rightForeArm.rotation.x, initialBoneRotations.get(bodyBones.rightForeArm.uuid).x + currentPoseTarget.rForeX, lerpSpeed);
                    
                    if(bodyBones.spine) bodyBones.spine.rotation.y = THREE.MathUtils.lerp(bodyBones.spine.rotation.y, initialBoneRotations.get(bodyBones.spine.uuid).y + currentPoseTarget.spineY + Math.sin(time)*0.02, lerpSpeed);
                    if(bodyBones.neck) bodyBones.neck.rotation.x = THREE.MathUtils.lerp(bodyBones.neck.rotation.x, initialBoneRotations.get(bodyBones.neck.uuid).x + currentPoseTarget.neckX + Math.cos(time*1.5)*0.02, lerpSpeed);

                } else {
                    // --- NATURAL IDLE STATE ---
                    modelGroup.position.y = (Math.sin(time * 1.5) * 0.005) - 0.5; 
                    mouthOpenIntensity = THREE.MathUtils.lerp(mouthOpenIntensity, 0, 0.2);
                    
                    // Reset waveform
                    document.querySelectorAll('.waveform .bar').forEach(bar => bar.style.height = '20%');

                    const lerpSpeed = 0.03;
                    if(bodyBones.leftArm) bodyBones.leftArm.rotation.z = THREE.MathUtils.lerp(bodyBones.leftArm.rotation.z, initialBoneRotations.get(bodyBones.leftArm.uuid).z + breath, lerpSpeed);
                    if(bodyBones.rightArm) bodyBones.rightArm.rotation.z = THREE.MathUtils.lerp(bodyBones.rightArm.rotation.z, initialBoneRotations.get(bodyBones.rightArm.uuid).z - breath, lerpSpeed);
                    if(bodyBones.leftForeArm) bodyBones.leftForeArm.rotation.x = THREE.MathUtils.lerp(bodyBones.leftForeArm.rotation.x, initialBoneRotations.get(bodyBones.leftForeArm.uuid).x, lerpSpeed);
                    if(bodyBones.rightForeArm) bodyBones.rightForeArm.rotation.x = THREE.MathUtils.lerp(bodyBones.rightForeArm.rotation.x, initialBoneRotations.get(bodyBones.rightForeArm.uuid).x, lerpSpeed);
                    if(bodyBones.spine) bodyBones.spine.rotation.y = THREE.MathUtils.lerp(bodyBones.spine.rotation.y, initialBoneRotations.get(bodyBones.spine.uuid).y, lerpSpeed);
                    if(bodyBones.neck) bodyBones.neck.rotation.x = THREE.MathUtils.lerp(bodyBones.neck.rotation.x, initialBoneRotations.get(bodyBones.neck.uuid).x, lerpSpeed);
                }

                // Apply Jaw Transform
                if (jawBone) {
                    jawBone.rotation.x = mouthOpenIntensity * 0.8; 
                } else {
                    modelGroup.traverse((child) => {
                        if (child.morphTargetInfluences && child.morphTargetDictionary) {
                            const jawOpenIdx = child.morphTargetDictionary['jawOpen'] || child.morphTargetDictionary['mouth_open'];
                            if (jawOpenIdx !== undefined) child.morphTargetInfluences[jawOpenIdx] = mouthOpenIntensity * 2.0;
                        }
                    });
                }

                // Blinking Logic
                let blinkValue = 0;
                if (Math.floor(time) % 4 === 0 && (time % 4) < 0.1) blinkValue = 1.0;
                modelGroup.traverse((child) => {
                    if (child.morphTargetInfluences && child.morphTargetDictionary) {
                        const bL = child.morphTargetDictionary['eyeBlinkLeft'];
                        const bR = child.morphTargetDictionary['eyeBlinkRight'];
                        if (bL !== undefined) child.morphTargetInfluences[bL] = blinkValue;
                        if (bR !== undefined) child.morphTargetInfluences[bR] = blinkValue;
                    }
                });
            }

            controls.autoRotate = document.getElementById('btn-rotate').classList.contains('active-state');
            controls.update();
            renderer.render(scene, camera);
        }

        /* ==========================================
           3. UI CONTROLS & MANUAL MIC (TAP TO SPEAK)
           ========================================== */
        const btnRotate = document.getElementById('btn-rotate');
        const btnFullscreen = document.getElementById('btn-fullscreen');
        const btnCloseLesson = document.getElementById('btn-close-lesson');
        const btnMic = document.getElementById('btn-mic');
        const chatText = document.getElementById('chat-text');
        const audioWave = document.getElementById('audio-wave');
        const lessonBody = document.getElementById('lesson-body');

        btnRotate.addEventListener('click', () => btnRotate.classList.toggle('active-state'));
        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) wrapper.requestFullscreen().catch(e => console.warn(e));
            else document.exitFullscreen();
        });
        btnCloseLesson.addEventListener('click', () => setIdleMode());

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = SpeechRecognition ? new SpeechRecognition() : null;
        let isRecording = false;

        if (recognition) {
            recognition.continuous = false; // Turned off permanent loop
            recognition.interimResults = false;
            recognition.lang = 'hi-IN';

            recognition.onstart = () => {
                isRecording = true;
                btnMic.classList.add('listening');
                btnMic.innerHTML = `<svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg> Listening...`;
                chatText.innerHTML = "Speak now...";
                if(aiAudioElement) { aiAudioElement.pause(); isSpeaking = false; } // Stop AI if user speaks
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.trim();
                handleUserQuery(transcript);
            };

            recognition.onend = () => {
                isRecording = false;
                btnMic.classList.remove('listening');
                btnMic.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg> Tap to Speak`;
            };
        }

        btnMic.addEventListener('click', () => {
            initAudioAnalyzer(); // Ensure audio context is ready on user gesture
            if (!recognition) {
                alert("Speech Recognition not supported in this browser.");
                return;
            }
            if (isRecording) {
                recognition.stop();
            } else {
                recognition.start();
            }
        });

        function setTeachingMode() {
            isTeachingMode = true; wrapper.classList.add('teaching-mode');
            uiModeBadge.innerText = "TEACHING MODE"; uiModeBadge.style.color = "var(--danger)";
            document.getElementById('status-text').innerText = "AI SPEAKING";
        }

        function setIdleMode() {
            isTeachingMode = false; wrapper.classList.remove('teaching-mode');
            uiModeBadge.innerText = "IDLE MODE"; uiModeBadge.style.color = "var(--accent-color)";
            document.getElementById('status-text').innerText = "SYSTEM READY";
            if(aiAudioElement) { aiAudioElement.pause(); }
            isSpeaking = false; audioWave.classList.remove('speaking');
        }

        /* ==========================================
           4. GEMINI API FETCH & AUDIO PLAYBACK
           ========================================== */
        async function handleUserQuery(query) {
            chatText.innerHTML = `<strong>You:</strong> ${query}`;
            setTeachingMode();
            lessonBody.innerHTML = `<span style="color:var(--text-muted); font-size:12px;">Generating teaching response...</span>`;

            try {
                // Fetch to Gemini (using the specified model and API key)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: {
                            parts: [{ text: "You are Mr Amrit, an elite AI virtual teacher. Respond in maximum 2-3 sentences in Hinglish. No markdown." }]
                        },
                        contents: [{ parts: [{ text: query }] }]
                    })
                });

                if (!response.ok) throw new Error("Network Response Fail");
                
                const data = await response.json();
                
                // Extract Text
                const textPart = data.candidates[0].content.parts.find(p => p.text);
                const aiText = textPart ? textPart.text : "Samajh nahi aaya, phir se puchiye.";
                
                // Print text on screen
                lessonBody.innerHTML = `<div class="teaching-card">${aiText}</div>`;

                // Handle Audio / TTS Routing
                // If the preview model returns base64 inlineData, use it. Else fallback to standard reliable TTS for Analyser.
                const audioPart = data.candidates[0].content.parts.find(p => p.inlineData);
                
                let audioSrc = "";
                if (audioPart && audioPart.inlineData.data) {
                    audioSrc = `data:${audioPart.inlineData.mimeType};base64,${audioPart.inlineData.data}`;
                } else {
                    // Fallback to Google Translate TTS to generate an audio blob for perfect lip sync
                    audioSrc = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(aiText)}&tl=hi&client=tw-ob`;
                }

                playAIAudio(audioSrc);

            } catch (error) {
                console.error(error);
                lessonBody.innerHTML = `<strong style="color:var(--danger)">Connection failed. Try again.</strong>`;
                setIdleMode();
            }
        }

        function playAIAudio(audioUrl) {
            initAudioAnalyzer();
            
            if (aiAudioElement) { aiAudioElement.pause(); }
            
            aiAudioElement = new Audio(audioUrl);
            aiAudioElement.crossOrigin = "anonymous"; // Required for Web Audio API
            
            // Route Audio through Analyser to get Volume/Frequencies for Mouth
            const source = audioCtx.createMediaElementSource(aiAudioElement);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);

            aiAudioElement.onplay = () => {
                isSpeaking = true;
                audioWave.classList.add('speaking');
            };

            aiAudioElement.onended = () => {
                isSpeaking = false;
                audioWave.classList.remove('speaking');
                document.getElementById('status-text').innerText = "SYSTEM READY";
            };

            aiAudioElement.onerror = () => {
                console.error("Audio Playback Error. Check CORS or URL.");
                isSpeaking = false;
                audioWave.classList.remove('speaking');
            }

            aiAudioElement.play().catch(e => console.warn("Auto-play blocked", e));
        }
    </script>
</body>
</html>
