<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Teacher - Virtual Classroom</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           GLOBAL & VARIABLES
           ========================================== */
        :root {
            --bg-color: #FFFFFF;
            --surface-color: rgba(255, 255, 255, 0.85);
            --surface-solid: #FFFFFF;
            --text-main: #1D1D1F;
            --text-muted: #86868B;
            --accent-color: #0066CC;
            --accent-glow: rgba(0, 102, 204, 0.1);
            --danger: #FF3B30;
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
            --border-radius-sm: 12px;
            --transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch; 
        }

        .glass {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }

        /* ==========================================
           LANGUAGE SELECTION OVERLAY
           ========================================== */
        #lang-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--surface-solid);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            transition: opacity 0.5s ease;
        }

        .lang-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            text-align: center;
        }

        .lang-options {
            display: flex;
            gap: 20px;
        }

        .lang-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 20px var(--accent-glow);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .lang-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 102, 204, 0.3);
        }

        /* ==========================================
           LAYOUT MAIN
           ========================================== */
        .app-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
            box-sizing: border-box;
            gap: 16px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-radius: var(--border-radius-lg);
            z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }

        .live-badge {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255, 59, 48, 0.1); color: var(--danger);
            padding: 4px 12px; border-radius: 20px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
        }

        .live-dot {
            width: 6px; height: 6px; background: var(--danger); border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 59, 48, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .teacher-info h1 { font-size: 16px; font-weight: 600; }
        .teacher-info p { font-size: 12px; color: var(--text-muted); }

        .header-right { display: flex; align-items: center; gap: 12px; }
        
        .mode-indicator {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-color);
            background: var(--accent-glow);
            padding: 6px 12px;
            border-radius: 12px;
        }

        /* ==========================================
           VIDEO SECTION
           ========================================== */
        .video-section {
            width: 100%; 
            height: 55vh; 
            min-height: 340px;
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .canvas-wrapper {
            position: relative; 
            width: 100%; 
            height: 100%;
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            background: #FFFFFF; 
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.03);
        }
        
        #canvas-container { width: 100%; height: 100%; display: block; }

        #loader {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: #FFFFFF; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #f0f0f5; border-top: 3px solid var(--accent-color);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        #lesson-panel {
            position: absolute;
            bottom: 16px; left: 50%;
            transform: translateX(-50%) translateY(130%);
            width: 92%;
            max-width: 550px;
            border-radius: var(--border-radius-md);
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.08);
            display: flex; flex-direction: column;
            opacity: 0;
            transition: var(--transition);
            z-index: 10;
            max-height: 150px;
        }

        .canvas-wrapper.teaching-mode #lesson-panel {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .lesson-header {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }

        .lesson-header h3 {
            font-size: 11px; font-weight: 700;
            color: var(--accent-color); text-transform: uppercase;
            display: flex; align-items: center; gap: 6px;
        }

        .btn-close-lesson {
            background: #f0f0f5; border: none; width: 20px; height: 20px;
            border-radius: 50%; font-size: 12px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            color: var(--text-muted);
        }

        .lesson-body { flex-grow: 1; padding: 12px; overflow-y: auto; }
        .teaching-card { font-size: 13.5px; line-height: 1.5; color: var(--text-main); }

        /* ==========================================
           INTERACTION & CONTROLS AREA
           ========================================== */
        .interaction-area {
            display: flex; flex-direction: column; gap: 12px;
            max-width: 900px; width: 100%; margin: 0 auto;
        }

        .controls-bar {
            display: flex; justify-content: center; gap: 14px;
            padding: 8px; border-radius: var(--border-radius-lg);
        }

        .icon-btn {
            background: var(--surface-solid); border: 1px solid rgba(0,0,0,0.05);
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.3s;
        }

        .icon-btn:hover { transform: translateY(-2px); }
        .icon-btn svg { width: 18px; height: 18px; fill: currentColor; }
        .icon-btn.active-state { background: var(--text-main); color: white; }

        .chat-display {
            padding: 12px 16px; border-radius: var(--border-radius-lg);
            min-height: 54px; max-height: 74px; overflow-y: auto;
            font-size: 13.5px;
        }

        .ai-label {
            font-size: 10px; font-weight: 700; color: var(--accent-color);
            text-transform: uppercase; margin-bottom: 2px; display: flex; align-items: center; gap: 6px;
        }

        /* Waveform Animation */
        .waveform { display: flex; align-items: center; gap: 2px; height: 10px; }
        .bar {
            width: 2px; background-color: var(--danger); border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }
        .bar:nth-child(1) { height: 40%; animation-delay: 0.0s; }
        .bar:nth-child(2) { height: 80%; animation-delay: 0.2s; }
        .bar:nth-child(3) { height: 100%; animation-delay: 0.4s; }
        .bar:nth-child(4) { height: 60%; animation-delay: 0.6s; }
        @keyframes wave { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1); } }
        
        .waveform.speaking .bar { background-color: var(--accent-color); }

        .input-group {
            display: flex; gap: 8px; padding: 6px;
            border-radius: var(--border-radius-lg); align-items: center;
            opacity: 0.6; pointer-events: none; /* User shouldn't need to type now */
        }

        .input-field {
            flex-grow: 1; background: transparent; border: none; outline: none;
            padding: 8px 12px; font-size: 14.5px; color: var(--text-main);
        }

        .send-btn {
            background: var(--text-main); color: white; border: none;
            padding: 10px 20px; border-radius: 20px; font-weight: 600;
            cursor: pointer; transition: all 0.3s; font-size: 13px;
        }

        @media (max-width: 768px) {
            .app-layout { padding: 12px; gap: 12px; }
            .video-section { height: 48vh; }
            #lesson-panel { width: 94%; bottom: 12px; }
            .lang-options { flex-direction: column; width: 80%; }
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="lang-overlay">
        <div class="lang-title">Choose your language<br><span style="font-size: 20px; color: var(--text-muted);">अपनी भाषा चुनें</span></div>
        <div class="lang-options">
            <button class="lang-btn" onclick="startGame('en-US')">English</button>
            <button class="lang-btn" onclick="startGame('hi-IN')">हिंदी (Hindi)</button>
        </div>
    </div>

    <div class="app-layout">
        
        <header class="glass">
            <div class="header-left">
                <div class="live-badge">
                    <div class="live-dot"></div> LIVE
                </div>
                <div class="teacher-info">
                    <h1>Dr. Nova</h1>
                    <p>AI EdTech Platform</p>
                </div>
            </div>
            <div class="header-right">
                <span class="mode-indicator" id="ui-mode-badge">IDLE MODE</span>
            </div>
        </header>

        <section class="video-section">
            <div class="canvas-wrapper" id="video-wrapper">
                
                <div id="loader">
                    <div class="spinner"></div>
                    <div id="loading-status" style="font-size: 13px; color: #666; font-weight: 500;">Loading Virtual Teacher...</div>
                </div>

                <div id="canvas-container"></div>
                
                <div id="lesson-panel">
                    <div class="lesson-header">
                        <h3><div class="live-dot" style="background:var(--accent-color);"></div> AI Explanation</h3>
                        <button class="btn-close-lesson" id="btn-close-lesson" title="Clear">&times;</button>
                    </div>
                    <div class="lesson-body" id="lesson-body"></div>
                </div>
            </div>
        </section>

        <section class="interaction-area">
            
            <div class="controls-bar glass">
                <button class="icon-btn" id="btn-fullscreen" title="Fullscreen Class">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
                <button class="icon-btn active-state" id="btn-rotate" title="Toggle Auto-Rotate">
                    <svg viewBox="0 0 24 24"><path d="M15.55 5.55L11 1v3C7.06 4 4 7.06 4 11s3.06 7 7 7v-2c-2.76 0-5-2.24-5-5s2.24-5 5-5v3l4.55-4.45zM19.93 11c-.17-1.39-.72-2.73-1.62-3.89l-1.42 1.42c.54.75.88 1.6 1.02 2.47h2.02zM13 17.9v2.02c1.39-.17 2.74-.71 3.9 shadow-1.61l-1.44-1.44c-.75.54-1.59.89-2.46 1.03zm3.44-2.43l1.41 1.41c.91-1.16 1.46-2.51 1.63-3.9h-2.02c-.14.87-.48 1.72-1.02 2.49z"/></svg>
                </button>
                <button class="icon-btn active-state" id="btn-sound" title="Toggle AI Voice">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
            </div>

            <div class="chat-display glass">
                <div class="ai-label">
                    <span id="status-text">LISTENING</span> 
                    <div class="waveform" id="audio-wave">
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    </div>
                </div>
                <p id="chat-text" style="color: var(--text-muted);">Please select a language to start...</p>
            </div>

            <div class="input-group glass" style="display:none;">
                <input type="text" class="input-field" id="chat-input" placeholder="Always listening... Just speak!">
            </div>

        </section>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        /* ==========================================
           IMPORTANT: API KEY SYSTEM CONFIGURATION
           ========================================== */
        const GEMINI_API_KEY = "AIzaSyCD6Zs9b3fASvxfqeVYWWhqZam27uZKsqQ";
        
        let currentLangCode = 'en-US';
        let geminiPromptLang = 'English';

        // Make startGame global so HTML buttons can access it
        window.startGame = function(langCode) {
            document.getElementById('lang-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('lang-overlay').style.display = 'none';
            }, 500);

            currentLangCode = langCode;
            geminiPromptLang = langCode === 'hi-IN' ? 'Hindi' : 'English';
            
            if (recognition) {
                recognition.lang = currentLangCode;
            }

            const greetingText = langCode === 'hi-IN' ? "मैं आपकी कैसे मदद कर सकता हूँ?" : "How can I help you?";
            
            // Start continuous listening mechanism
            document.getElementById('chat-text').innerText = langCode === 'hi-IN' ? "सुन रहा हूँ... अपना सवाल पूछें।" : "Listening... Ask your question.";
            
            // Initial Greeting
            speakText(greetingText);
        }

        /* ==========================================
           1. THREE.JS ENVIRONMENT SETUP
           ========================================== */
        let scene, camera, renderer, controls, clock, modelGroup;
        
        // Bone Animation Variables
        let jawBone = null; 
        let bodyBones = {
            spine: null, neck: null, head: null,
            leftArm: null, rightArm: null,
            leftForeArm: null, rightForeArm: null,
            leftUpLeg: null, rightUpLeg: null
        };
        const initialBoneRotations = new Map();
        
        const container = document.getElementById('canvas-container');
        const wrapper = document.getElementById('video-wrapper');
        const loaderUI = document.getElementById('loader');
        const loadingStatus = document.getElementById('loading-status');

        let isTeachingMode = false;
        let isSpeaking = false;
        let mouthOpenIntensity = 0;
        
        // Dynamic Gesture Targets for natural human movement
        let gestureTargets = {
            lArmZ: 0, rArmZ: 0, lForeArmX: 0, rForeArmX: 0, spineY: 0, neckX: 0
        };
        let lastGestureTime = 0;
        
        const absoluteCenterTarget = new THREE.Vector3(0, 1.1, 0);
        const uiModeBadge = document.getElementById('ui-mode-badge');

        init3D();
        animate3D();

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff); 
            clock = new THREE.Clock();

            const aspect = container.clientWidth / container.clientHeight;
            camera = new THREE.PerspectiveCamera(42, aspect, 0.1, 100);
            updateCameraPosition();

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.4);
            scene.add(ambientLight);

            const keyLight = new THREE.DirectionalLight(0xffffff, 1.6);
            keyLight.position.set(1, 3, 3);
            scene.add(keyLight);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.minDistance = 1.0;
            controls.maxDistance = 25; 
            controls.enablePan = false;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.4;
            controls.target.copy(absoluteCenterTarget);

            modelGroup = new THREE.Group();
            scene.add(modelGroup);

            const fallbackTimeout = setTimeout(() => {
                if (loaderUI && loaderUI.style.display !== 'none') {
                    loaderUI.style.opacity = '0';
                    setTimeout(() => loaderUI.style.display = 'none', 200);
                }
            }, 8000);

            const loader = new GLTFLoader();
            loader.load('./teacher.glb', function (gltf) {
                clearTimeout(fallbackTimeout);
                const model = gltf.scene;

                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = false; 
                        child.receiveShadow = false;
                        if(child.material) {
                            child.material.roughness = 0.5;
                            child.material.metalness = 0.0;
                        }
                    }
                    if (child.isBone) {
                        initialBoneRotations.set(child.uuid, child.rotation.clone());
                        
                        const name = child.name.toLowerCase();
                        if (name.includes('jaw') || name.includes('mouth')) jawBone = child;
                        else if (name.includes('spine') || name.includes('chest')) bodyBones.spine = child;
                        else if (name.includes('neck')) bodyBones.neck = child;
                        else if (name.includes('head')) bodyBones.head = child;
                        else if (name.includes('leftarm') || name.includes('left_arm')) bodyBones.leftArm = child;
                        else if (name.includes('rightarm') || name.includes('right_arm')) bodyBones.rightArm = child;
                        else if (name.includes('leftforearm') || name.includes('left_forearm')) bodyBones.leftForeArm = child;
                        else if (name.includes('rightforearm') || name.includes('right_forearm')) bodyBones.rightForeArm = child;
                        else if (name.includes('leftupleg') || name.includes('left_leg') || name.includes('leftthigh')) bodyBones.leftUpLeg = child;
                        else if (name.includes('rightupleg') || name.includes('right_leg') || name.includes('rightthigh')) bodyBones.rightUpLeg = child;
                    }
                });

                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const targetHeight = 2.2;
                const scale = targetHeight / (size.y || 1);
                model.scale.set(scale, scale, scale);
                
                const scaledBox = new THREE.Box3().setFromObject(model);
                const center = scaledBox.getCenter(new THREE.Vector3());
                
                model.position.x = -center.x; 
                model.position.y = -center.y - 0.5; 
                model.position.z = -center.z;

                modelGroup.add(model);

                loaderUI.style.opacity = '0';
                setTimeout(() => loaderUI.style.display = 'none', 200);
            }, 
            function (xhr) {
                if (xhr.total) {
                    const percent = Math.round((xhr.loaded / xhr.total) * 100);
                    loadingStatus.innerText = `Loading Dr. Nova Engine (${percent}%)...`;
                } else {
                    loadingStatus.innerText = `Streaming Virtual Headsets...`;
                }
            },
            function (error) {
                console.error(error);
                clearTimeout(fallbackTimeout);
                loaderUI.style.opacity = '0';
                setTimeout(() => loaderUI.style.display = 'none', 200);
            });

            const resizeObserver = new ResizeObserver(() => {
                const width = container.clientWidth;
                const height = container.clientHeight;
                camera.aspect = width / height;
                updateCameraPosition();
                camera.updateProjectionMatrix();
                renderer.setSize(width, height);
            });
            resizeObserver.observe(container);
        }

        function updateCameraPosition() {
            if (container.clientWidth < 768) {
                camera.position.set(0, 1.2, 12.65); 
            } else {
                camera.position.set(0, 1.2, 10.95); 
            }
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            const time = clock.getElapsedTime();

            controls.target.lerp(absoluteCenterTarget, 0.1);

            if (modelGroup && modelGroup.children.length > 0) {
                
                const breath = Math.sin(time * 1.5);

                if (isSpeaking) {
                    // --- NATURAL LIP SYNC (Stacked sine waves for realistic syllable simulation) ---
                    // Instead of a single boring wave, mix different fast frequencies
                    const speechWave1 = Math.sin(time * 25);
                    const speechWave2 = Math.cos(time * 18);
                    const speechWave3 = Math.sin(time * 38);
                    
                    // Creates an irregular pattern that looks like forming different words
                    const combinedWave = Math.abs((speechWave1 + speechWave2 + speechWave3) / 3);
                    const targetMouthOpen = combinedWave * 0.45 + 0.05; 
                    
                    mouthOpenIntensity = THREE.MathUtils.lerp(mouthOpenIntensity, targetMouthOpen, 0.4);

                    // --- NATURAL BODY & HAND GESTURES ---
                    // Randomly update gesture targets every 1.2 to 2.5 seconds to look human
                    if (time - lastGestureTime > (Math.random() * 1.3 + 1.2)) {
                        lastGestureTime = time;
                        gestureTargets.lArmZ = Math.random() * 0.25 + 0.05;
                        gestureTargets.rArmZ = -(Math.random() * 0.25 + 0.05);
                        gestureTargets.lForeArmX = -(Math.random() * 0.6);
                        gestureTargets.rForeArmX = -(Math.random() * 0.6);
                        gestureTargets.spineY = (Math.random() - 0.5) * 0.15;
                        gestureTargets.neckX = (Math.random() - 0.5) * 0.1;
                    }

                    // Global body subtle movement while explaining
                    modelGroup.position.y = (Math.sin(time * 3.5) * 0.005) - 0.5; 

                    // Smoothly Lerp bones to the randomized human targets
                    if(bodyBones.leftArm) bodyBones.leftArm.rotation.z = THREE.MathUtils.lerp(bodyBones.leftArm.rotation.z, initialBoneRotations.get(bodyBones.leftArm.uuid).z + gestureTargets.lArmZ, 0.08);
                    if(bodyBones.rightArm) bodyBones.rightArm.rotation.z = THREE.MathUtils.lerp(bodyBones.rightArm.rotation.z, initialBoneRotations.get(bodyBones.rightArm.uuid).z + gestureTargets.rArmZ, 0.08);
                    if(bodyBones.leftForeArm) bodyBones.leftForeArm.rotation.x = THREE.MathUtils.lerp(bodyBones.leftForeArm.rotation.x, initialBoneRotations.get(bodyBones.leftForeArm.uuid).x + gestureTargets.lForeArmX, 0.08);
                    if(bodyBones.rightForeArm) bodyBones.rightForeArm.rotation.x = THREE.MathUtils.lerp(bodyBones.rightForeArm.rotation.x, initialBoneRotations.get(bodyBones.rightForeArm.uuid).x + gestureTargets.rForeArmX, 0.08);
                    
                    if(bodyBones.spine) bodyBones.spine.rotation.y = THREE.MathUtils.lerp(bodyBones.spine.rotation.y, initialBoneRotations.get(bodyBones.spine.uuid).y + gestureTargets.spineY, 0.05);
                    if(bodyBones.neck) bodyBones.neck.rotation.x = THREE.MathUtils.lerp(bodyBones.neck.rotation.x, initialBoneRotations.get(bodyBones.neck.uuid).x + gestureTargets.neckX, 0.05);
                    
                    if(bodyBones.leftUpLeg) bodyBones.leftUpLeg.rotation.z = THREE.MathUtils.lerp(bodyBones.leftUpLeg.rotation.z, initialBoneRotations.get(bodyBones.leftUpLeg.uuid).z + breath * 0.015, 0.1);
                    if(bodyBones.rightUpLeg) bodyBones.rightUpLeg.rotation.z = THREE.MathUtils.lerp(bodyBones.rightUpLeg.rotation.z, initialBoneRotations.get(bodyBones.rightUpLeg.uuid).z + breath * 0.015, 0.1);

                } else {
                    // IDLE STATE (Breathing gently, arms resting down)
                    modelGroup.position.y = (Math.sin(time * 1.2) * 0.004) - 0.5; 
                    modelGroup.rotation.y = THREE.MathUtils.lerp(modelGroup.rotation.y, 0, 0.05);
                    mouthOpenIntensity = THREE.MathUtils.lerp(mouthOpenIntensity, 0, 0.2);

                    if(bodyBones.leftArm) bodyBones.leftArm.rotation.z = THREE.MathUtils.lerp(bodyBones.leftArm.rotation.z, initialBoneRotations.get(bodyBones.leftArm.uuid).z + breath * 0.02, 0.05);
                    if(bodyBones.rightArm) bodyBones.rightArm.rotation.z = THREE.MathUtils.lerp(bodyBones.rightArm.rotation.z, initialBoneRotations.get(bodyBones.rightArm.uuid).z - breath * 0.02, 0.05);
                    if(bodyBones.leftForeArm) bodyBones.leftForeArm.rotation.x = THREE.MathUtils.lerp(bodyBones.leftForeArm.rotation.x, initialBoneRotations.get(bodyBones.leftForeArm.uuid).x, 0.05);
                    if(bodyBones.rightForeArm) bodyBones.rightForeArm.rotation.x = THREE.MathUtils.lerp(bodyBones.rightForeArm.rotation.x, initialBoneRotations.get(bodyBones.rightForeArm.uuid).x, 0.05);
                    if(bodyBones.spine) bodyBones.spine.rotation.y = THREE.MathUtils.lerp(bodyBones.spine.rotation.y, initialBoneRotations.get(bodyBones.spine.uuid).y, 0.05);
                    if(bodyBones.neck) bodyBones.neck.rotation.x = THREE.MathUtils.lerp(bodyBones.neck.rotation.x, initialBoneRotations.get(bodyBones.neck.uuid).x, 0.05);
                    if(bodyBones.leftUpLeg) bodyBones.leftUpLeg.rotation.z = THREE.MathUtils.lerp(bodyBones.leftUpLeg.rotation.z, initialBoneRotations.get(bodyBones.leftUpLeg.uuid).z, 0.05);
                    if(bodyBones.rightUpLeg) bodyBones.rightUpLeg.rotation.z = THREE.MathUtils.lerp(bodyBones.rightUpLeg.rotation.z, initialBoneRotations.get(bodyBones.rightUpLeg.uuid).z, 0.05);
                }

                // Apply Jaw Rotation or Morph Target
                if (jawBone) {
                    jawBone.rotation.x = mouthOpenIntensity; 
                } else {
                    modelGroup.traverse((child) => {
                        if (child.morphTargetInfluences && child.morphTargetDictionary) {
                            const jawOpenIdx = child.morphTargetDictionary['jawOpen'] || child.morphTargetDictionary['mouth_open'] || child.morphTargetDictionary['Mouth_Open'];
                            if (jawOpenIdx !== undefined) {
                                child.morphTargetInfluences[jawOpenIdx] = mouthOpenIntensity * 3.0;
                            }
                        }
                    });
                }

                // Natural Blinking
                let blinkValue = 0;
                if (Math.floor(time) % 5 === 0 && (time % 5) < 0.15) {
                    blinkValue = 1.0;
                } else if (Math.floor(time) % 8 === 0 && (time % 8) < 0.15) {
                    blinkValue = 1.0; // Double blink variance
                }
                modelGroup.traverse((child) => {
                    if (child.morphTargetInfluences && child.morphTargetDictionary) {
                        const blinkL = child.morphTargetDictionary['eyeBlinkLeft'] || child.morphTargetDictionary['blink_left'];
                        const blinkR = child.morphTargetDictionary['eyeBlinkRight'] || child.morphTargetDictionary['blink_right'];
                        if (blinkL !== undefined) child.morphTargetInfluences[blinkL] = blinkValue;
                        if (blinkR !== undefined) child.morphTargetInfluences[blinkR] = blinkValue;
                    }
                });
            }

            controls.autoRotate = document.getElementById('btn-rotate').classList.contains('active-state');
            controls.update();
            renderer.render(scene, camera);
        }

        /* ==========================================
           3. UI CONTROLS & HANDLERS
           ========================================== */
        const btnRotate = document.getElementById('btn-rotate');
        const btnFullscreen = document.getElementById('btn-fullscreen');
        const btnSound = document.getElementById('btn-sound');
        const btnCloseLesson = document.getElementById('btn-close-lesson');
        
        let soundEnabled = true;

        btnRotate.addEventListener('click', () => btnRotate.classList.toggle('active-state'));

        btnSound.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            btnSound.classList.toggle('active-state');
            if(!soundEnabled) {
                window.speechSynthesis.cancel();
                isSpeaking = false;
            }
        });

        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                wrapper.requestFullscreen().catch(err => console.warn(err));
            } else {
                document.exitFullscreen();
            }
        });

        btnCloseLesson.addEventListener('click', () => setIdleMode());

        function setTeachingMode() {
            isTeachingMode = true;
            wrapper.classList.add('teaching-mode');
            uiModeBadge.innerText = "TEACHING MODE";
            uiModeBadge.style.background = "rgba(255, 59, 48, 0.1)";
            uiModeBadge.style.color = "var(--danger)";
            document.getElementById('status-text').innerText = "SPEAKING";
        }

        function setIdleMode() {
            isTeachingMode = false;
            wrapper.classList.remove('teaching-mode');
            uiModeBadge.innerText = "IDLE MODE";
            uiModeBadge.style.background = "var(--accent-glow)";
            uiModeBadge.style.color = "var(--accent-color)";
            document.getElementById('status-text').innerText = "LISTENING";
            window.speechSynthesis.cancel();
            isSpeaking = false;
        }

        /* ==========================================
           4. CHAT PIPELINES ENGINE (ALWAYS LISTENING)
           ========================================== */
        const chatText = document.getElementById('chat-text');
        const audioWave = document.getElementById('audio-wave');
        const lessonBody = document.getElementById('lesson-body');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isEngineProcessing = false;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true; // Always listen
            recognition.interimResults = false;

            recognition.onstart = () => {
                // Mic started
            };

            recognition.onresult = (event) => {
                // If AI is currently talking or processing, ignore what it hears
                if (isSpeaking || isEngineProcessing) return;

                const last = event.results.length - 1;
                const transcript = event.results[last][0].transcript.trim();
                
                if (transcript.length > 2) {
                    handleUserQuery(transcript);
                }
            };

            recognition.onerror = (e) => {
                // Restart quietly if no-speech timeout happens
            };

            recognition.onend = () => {
                // Keep the mic always alive unless the page unloads
                if (!isSpeaking) {
                    try { recognition.start(); } catch(e) {}
                }
            };
        } else {
            chatText.innerHTML = "Your browser doesn't support Voice AI. Please use Chrome.";
        }

        // Keep mic alive periodically fallback
        setInterval(() => {
            if (recognition && !isSpeaking && !isEngineProcessing) {
                try { recognition.start(); } catch(e) {}
            }
        }, 3000);

        async function handleUserQuery(query) {
            isEngineProcessing = true;
            try { recognition.stop(); } catch(e){} // Stop mic to avoid self-hearing
            
            chatText.innerHTML = `<strong>You:</strong> ${query}`;
            
            setTeachingMode();
            lessonBody.innerHTML = `<span style="color:var(--text-muted); font-size:12px;">Thinking...</span>`;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${GEMINI_API_KEY}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: {
                            parts: [{ text: `You are Mr Amrit, an elite AI virtual teacher. Format responses into a single brief clean actionable explanation paragraph. Do not use asterisks or markdown. Always reply strictly in ${geminiPromptLang} language.` }]
                        },
                        contents: [{ parts: [{ text: query }] }]
                    })
                });

                if (!response.ok) throw new Error("Network Response Fail");
                
                const data = await response.json();
                const aiResponseText = data.candidates[0].content.parts[0].text;
                
                await streamResponseIntoCards(aiResponseText);

            } catch (error) {
                console.error(error);
                chatText.innerHTML = `<strong style="color:var(--danger)">Connection failed. Trying again...</strong>`;
                setIdleMode();
                isEngineProcessing = false;
                try { recognition.start(); } catch(e){}
            }
        }

        async function streamResponseIntoCards(text) {
            lessonBody.innerHTML = "";
            if (soundEnabled) speakText(text);

            const card = document.createElement('div');
            card.className = 'teaching-card';
            lessonBody.appendChild(card);
            
            const tokens = text.split(/(\s+)/);
            let structuredOutput = "";
            
            for (let token of tokens) {
                structuredOutput += token;
                card.innerHTML = structuredOutput;
                lessonBody.scrollTop = lessonBody.scrollHeight;
                await new Promise(resolve => setTimeout(resolve, 35));
            }
        }

        function speakText(text) {
            if (!window.speechSynthesis) {
                isEngineProcessing = false;
                try { recognition.start(); } catch(e){}
                return;
            }
            window.speechSynthesis.cancel();
            try { recognition.stop(); } catch(e){} // Stop listening while talking

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.lang = currentLangCode;
            
            const voices = window.speechSynthesis.getVoices();
            // Try to find a voice matching the chosen language
            const chosenVoice = voices.find(v => v.lang.includes(currentLangCode.split('-')[0])) || voices[0];
            if(chosenVoice) utterance.voice = chosenVoice;

            utterance.onstart = () => {
                isSpeaking = true;
                audioWave.classList.add('speaking');
            };
            
            utterance.onend = () => {
                isSpeaking = false;
                isEngineProcessing = false;
                audioWave.classList.remove('speaking');
                document.getElementById('status-text').innerText = "LISTENING";
                // Resume listening immediately after AI finishes speaking
                try { recognition.start(); } catch(e){}
            };

            utterance.onerror = () => {
                isSpeaking = false;
                isEngineProcessing = false;
                audioWave.classList.remove('speaking');
                try { recognition.start(); } catch(e){}
            };

            window.speechSynthesis.speak(utterance);
        }

        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };
    </script>
</body>
</html>
