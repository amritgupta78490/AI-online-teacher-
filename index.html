<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Teacher - Mr. Amrit Virtual Classroom</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #FFFFFF;
            --surface-color: rgba(255, 255, 255, 0.85);
            --surface-solid: #FFFFFF;
            --text-main: #1D1D1F;
            --text-muted: #86868B;
            --accent-color: #0066CC;
            --accent-glow: rgba(0, 102, 204, 0.1);
            --danger: #FF3B30;
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
            --border-radius-sm: 12px;
            --transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch; 
        }

        .glass {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }

        #lang-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--surface-solid);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            transition: opacity 0.5s ease;
        }

        .lang-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            text-align: center;
        }

        .lang-options {
            display: flex;
            gap: 20px;
        }

        .lang-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 20px var(--accent-glow);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .lang-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 102, 204, 0.3);
        }

        .app-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
            box-sizing: border-box;
            gap: 16px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-radius: var(--border-radius-lg);
            z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }

        .live-badge {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255, 59, 48, 0.1); color: var(--danger);
            padding: 4px 12px; border-radius: 20px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
        }

        .live-dot {
            width: 6px; height: 6px; background: var(--danger); border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 59, 48, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .teacher-info h1 { font-size: 16px; font-weight: 600; }
        .teacher-info p { font-size: 12px; color: var(--text-muted); }

        .header-right { display: flex; align-items: center; gap: 12px; }
        
        .mode-indicator {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-color);
            background: var(--accent-glow);
            padding: 6px 12px;
            border-radius: 12px;
        }

        .video-section {
            width: 100%; 
            height: 55vh; 
            min-height: 340px;
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .canvas-wrapper {
            position: relative; 
            width: 100%; 
            height: 100%;
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            background: #FFFFFF; 
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.03);
        }
        
        #canvas-container { width: 100%; height: 100%; display: block; }

        #loader {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: #FFFFFF; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #f0f0f5; border-top: 3px solid var(--accent-color);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        #lesson-panel {
            position: absolute;
            bottom: 16px; left: 50%;
            transform: translateX(-50%) translateY(130%);
            width: 92%;
            max-width: 550px;
            border-radius: var(--border-radius-md);
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.08);
            display: flex; flex-direction: column;
            opacity: 0;
            transition: var(--transition);
            z-index: 10;
            max-height: 150px;
        }

        .canvas-wrapper.teaching-mode #lesson-panel {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .lesson-header {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }

        .lesson-header h3 {
            font-size: 11px; font-weight: 700;
            color: var(--accent-color); text-transform: uppercase;
            display: flex; align-items: center; gap: 6px;
        }

        .btn-close-lesson {
            background: #f0f0f5; border: none; width: 20px; height: 20px;
            border-radius: 50%; font-size: 12px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            color: var(--text-muted);
        }

        .lesson-body { flex-grow: 1; padding: 12px; overflow-y: auto; }
        .teaching-card { font-size: 13.5px; line-height: 1.5; color: var(--text-main); }

        .interaction-area {
            display: flex; flex-direction: column; gap: 12px;
            max-width: 900px; width: 100%; margin: 0 auto;
        }

        .controls-bar {
            display: flex; justify-content: center; gap: 14px;
            padding: 8px; border-radius: var(--border-radius-lg);
        }

        .search-bar-container {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 16px; border-radius: var(--border-radius-lg);
        }

        #ai-search-input {
            flex-grow: 1; border: none; background: transparent; outline: none;
            font-size: 14px; color: var(--text-main); font-family: 'Inter', sans-serif;
        }

        #ai-search-input::placeholder { color: var(--text-muted); }

        .icon-btn {
            background: var(--surface-solid); border: 1px solid rgba(0,0,0,0.05);
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.3s;
        }

        .icon-btn:hover { transform: translateY(-2px); }
        .icon-btn svg { width: 18px; height: 18px; fill: currentColor; }
        
        .icon-btn.active-state { background: var(--accent-color); color: white; }
        .icon-btn.active-state svg { fill: white; }

        .chat-display {
            padding: 12px 16px; border-radius: var(--border-radius-lg);
            min-height: 54px; max-height: 74px; overflow-y: auto;
            font-size: 13.5px;
        }

        .ai-label {
            font-size: 10px; font-weight: 700; color: var(--accent-color);
            text-transform: uppercase; margin-bottom: 2px; display: flex; align-items: center; gap: 6px;
        }

        .waveform { display: flex; align-items: center; gap: 2px; height: 10px; opacity: 0; transition: opacity 0.3s; }
        .bar {
            width: 2px; background-color: var(--danger); border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }
        .bar:nth-child(1) { height: 40%; animation-delay: 0.0s; }
        .bar:nth-child(2) { height: 80%; animation-delay: 0.2s; }
        .bar:nth-child(3) { height: 100%; animation-delay: 0.4s; }
        .bar:nth-child(4) { height: 60%; animation-delay: 0.6s; }
        @keyframes wave { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1); } }
        
        .waveform.speaking { opacity: 1; }
        .waveform.speaking .bar { background-color: var(--accent-color); }
        .waveform.listening { opacity: 1; }
        .waveform.listening .bar { background-color: var(--danger); }

        @media (max-width: 768px) {
            .app-layout { padding: 12px; gap: 12px; }
            .video-section { height: 48vh; }
            #lesson-panel { width: 94%; bottom: 12px; }
            .lang-options { flex-direction: column; width: 80%; }
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

            }
        }
    </script>
</head>
<body>

    <div id="lang-overlay">
        <div class="lang-title">Choose your language<br><span style="font-size: 20px; color: var(--text-muted);">अपनी भाषा चुनें</span></div>

        <header class="glass">
            <div class="header-left">
                <div class="live-badge">
                    <div class="live-dot"></div> LIVE
                </div>
                <div class="teacher-info">

                <div id="loader">

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ==========================================
        // API KEYS & CONFIG
        // ==========================================
        const GEMINI_API_KEY = "AIzaSyDC3vs-oTy2ff_eJXS_MRd_4oN3AMdnxBs";
        const ELEVENLABS_API_KEY = "sk_440f24473b04dd28904c90deadfcc267ccb0a95632112a22";

        // Male voice - ElevenLabs "Adam" (deep, professional male)
        const ELEVENLABS_VOICE_ID = "pNInz6obpgDQGcFmaJgB"; // Adam - deep male voice

        let currentLangCode = 'en-US';
        let geminiPromptLang = 'English';

        // ==========================================
        // AUDIO CONTEXT & LIPSYNC ENGINE
        // ==========================================
        let audioCtx = null;
        let analyserNode = null;
        let currentAudioSource = null;
        let currentAudioElement = null;
        let audioDataArray = null;
        let lipsyncFromAudio = false;

        // Smoothed lipsync value driven by real audio amplitude
        let audioLipValue = 0;
        let audioLipSmoothed = 0;

        function getAudioContext() {
            if (!audioCtx || audioCtx.state === 'closed') {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function setupAnalyser(sourceNode) {
            const ctx = getAudioContext();
            analyserNode = ctx.createAnalyser();
            analyserNode.fftSize = 512;
            analyserNode.smoothingTimeConstant = 0.75;
            audioDataArray = new Uint8Array(analyserNode.frequencyBinCount);

            sourceNode.connect(analyserNode);
            analyserNode.connect(ctx.destination);
        }

        function getAudioAmplitude() {
            if (!analyserNode || !audioDataArray) return 0;
            analyserNode.getByteFrequencyData(audioDataArray);

            // Focus on speech frequency range: ~80Hz to ~3000Hz
            // At 44100Hz sample rate with fftSize=512, each bin = ~86Hz
            // Bins 1-35 roughly cover 86-3000Hz (speech fundamental + formants)
            let sum = 0;
            const speechBinStart = 1;
            const speechBinEnd = Math.min(35, audioDataArray.length);
            for (let i = speechBinStart; i < speechBinEnd; i++) {
                sum += audioDataArray[i];
            }
            const avg = sum / (speechBinEnd - speechBinStart);
            // Normalize: 0-255 → 0-1, with boost for visibility
            return Math.min(1.0, (avg / 255) * 2.8);
        }

        // ==========================================
        // ELEVENLABS TTS: Core speak function
        // ==========================================
        async function speakText(text) {
            if (!soundEnabled) return;

            // Stop any currently playing audio
            stopCurrentAudio();

            try {
                isSpeaking = true;
                lipsyncFromAudio = true;
                audioLipValue = 0;
                audioLipSmoothed = 0;

                // Reset gesture timing for fresh animation
                gesture.nextGestureTime = 0;
                audioWave.classList.remove('listening');
                audioWave.classList.add('speaking');
                document.getElementById('status-text').innerText = "SPEAKING";

                const response = await fetch(
                    `https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`,
                    {
                        method: 'POST',
                        headers: {
                            'xi-api-key': ELEVENLABS_API_KEY,
                            'Content-Type': 'application/json',
                            'Accept': 'audio/mpeg'
                        },
                        body: JSON.stringify({
                            text: text,
                            model_id: 'eleven_multilingual_v2',
                            voice_settings: {
                                stability: 0.55,
                                similarity_boost: 0.80,
                                style: 0.35,
                                use_speaker_boost: true
                            }
                        })
                    }
                );

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`ElevenLabs API error ${response.status}: ${errText}`);
                }

                const arrayBuffer = await response.arrayBuffer();
                const blob = new Blob([arrayBuffer], { type: 'audio/mpeg' });
                const blobUrl = URL.createObjectURL(blob);

                // Create Audio element for playback
                const audio = new Audio(blobUrl);
                audio.crossOrigin = 'anonymous';
                currentAudioElement = audio;

                // Wire up AudioContext analyser for real lipsync
                const ctx = getAudioContext();
                const sourceNode = ctx.createMediaElementSource(audio);
                currentAudioSource = sourceNode;
                setupAnalyser(sourceNode);

                await new Promise((resolve, reject) => {
                    audio.onended = () => {
                        URL.revokeObjectURL(blobUrl);
                        onSpeakEnd();
                        resolve();
                    };
                    audio.onerror = (e) => {
                        URL.revokeObjectURL(blobUrl);
                        onSpeakEnd();
                        reject(e);
                    };
                    audio.play().catch(err => {
                        // Autoplay blocked — fallback gracefully
                        console.warn('Autoplay blocked:', err);
                        onSpeakEnd();
                        resolve();
                    });
                });

            } catch (error) {
                console.error('ElevenLabs TTS error:', error);
                onSpeakEnd();
                // Fallback: show error in chat
                chatText.innerHTML = `<strong style="color:var(--danger)">Voice unavailable. Check API key or network.</strong>`;
            }
        }

        function stopCurrentAudio() {
            if (currentAudioElement) {
                currentAudioElement.pause();
                currentAudioElement.src = '';
                currentAudioElement = null;
            }
            if (currentAudioSource) {
                try { currentAudioSource.disconnect(); } catch(e) {}
                currentAudioSource = null;
            }
            if (analyserNode) {
                try { analyserNode.disconnect(); } catch(e) {}
                analyserNode = null;
            }
            audioDataArray = null;
        }

        function onSpeakEnd() {
            isSpeaking = false;
            lipsyncFromAudio = false;
            isEngineProcessing = false;
            audioLipValue = 0;
            audioWave.classList.remove('speaking');
            document.getElementById('status-text').innerText = "IDLE";
            chatText.innerHTML = currentLangCode === 'hi-IN'
                ? "बोलने के लिए माइक बटन पर क्लिक करें..."
                : "Click the mic button to speak...";
        }

        window.startGame = function(langCode) {
            document.getElementById('lang-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('lang-overlay').style.display = 'none';
            }, 500);

            currentLangCode = langCode;
            geminiPromptLang = langCode === 'hi-IN' ? 'Hindi' : 'English';

            if (recognition) {
                recognition.lang = currentLangCode;
            }

            const greetingText = langCode === 'hi-IN'
                ? "नमस्ते, मैं मिस्टर अमृत हूँ। आप माइक बटन दबाकर अपना सवाल पूछ सकते हैं।"
                : "Hello, I am Mr. Amrit. I am your AI teacher. Click the mic button or type your question to get started.";
            
            document.getElementById('chat-text').innerText = langCode === 'hi-IN'
                ? "बोलने के लिए माइक बटन पर क्लिक करें..."
                : "Click the mic button to speak...";
            document.getElementById('ai-search-input').placeholder = langCode === 'hi-IN'
                ? "अपना सवाल यहाँ टाइप करें..."
                : "Type your question here...";

            speakText(greetingText);
        }

        /* ==========================================
           THREE.JS SCENE SETUP
        ========================================== */
        let scene, camera, renderer, controls, clock, modelGroup;
        
        let jawBone = null;
        let bodyBones = {
            spine: null, spine1: null, spine2: null,
            neck: null, head: null,
            leftShoulder: null, rightShoulder: null,
            leftArm: null, rightArm: null,
            leftForeArm: null, rightForeArm: null,
            leftHand: null, rightHand: null,
            leftUpLeg: null, rightUpLeg: null
        };
        const initialBoneRotations = new Map();
        
        // Morph target cache
        let morphMeshes = [];
        
        const container = document.getElementById('canvas-container');
        const wrapper = document.getElementById('video-wrapper');
        const loaderUI = document.getElementById('loader');
        const loadingStatus = document.getElementById('loading-status');

        let isTeachingMode = false;
        let isSpeaking = false;

        // ==========================================
        // AUDIO-DRIVEN LIPSYNC STATE
        // ==========================================
        let lipSync = {
            smoothed: 0,
            // Organic micro-oscillators layered on top of real audio amplitude
            phase1: 0,   // micro-rhythm layer
            phase2: 0,   // vowel-peak layer
            microNoise: 0,
        };

        // ==========================================
        // GESTURE ENGINE
        // ==========================================
        let gesture = {
            lArmZ: 0, rArmZ: 0,
            lForeArmX: 0, rForeArmX: 0,
            lForeArmZ: 0, rForeArmZ: 0,
            lHandX: 0, rHandX: 0,
            spineX: 0, spineY: 0, spineZ: 0,
            spine1X: 0,
            neckX: 0, neckY: 0,
            headX: 0, headY: 0, headZ: 0,
            tLArmZ: 0, tRArmZ: 0,
            tLForeArmX: 0, tRForeArmX: 0,
            tLForeArmZ: 0, tRForeArmZ: 0,
            tLHandX: 0, tRHandX: 0,
            tSpineX: 0, tSpineY: 0, tSpineZ: 0,
            tSpine1X: 0,
            tNeckX: 0, tNeckY: 0,
            tHeadX: 0, tHeadY: 0, tHeadZ: 0,
            nextGestureTime: 0,
            gesturePhase: 0,
        };

        // Blinking system
        let blink = {
            state: 0,
            value: 0,
            nextBlinkTime: 3,
            blinkSpeed: 8,
        };

        // Breathing system
        let breath = {
            phase: 0,
            chestPhase: 0,
        };

        const uiModeBadge = document.getElementById('ui-mode-badge');
        const absoluteCenterTarget = new THREE.Vector3(0, 1.1, 0);

        init3D();
        animate3D();

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);
            clock = new THREE.Clock();

            const aspect = container.clientWidth / container.clientHeight;
            camera = new THREE.PerspectiveCamera(42, aspect, 0.1, 100);
            updateCameraPosition();

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.4);
            scene.add(ambientLight);

            const keyLight = new THREE.DirectionalLight(0xffffff, 1.6);
            keyLight.position.set(1, 3, 3);
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0xfff5e0, 0.6);
            fillLight.position.set(-2, 1, 1);
            scene.add(fillLight);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.minDistance = 1.0;
            controls.maxDistance = 25;
            controls.enablePan = false;
            controls.autoRotate = false;
            controls.target.copy(absoluteCenterTarget);

            modelGroup = new THREE.Group();
            scene.add(modelGroup);

            const fallbackTimeout = setTimeout(() => {
                if (loaderUI && loaderUI.style.display !== 'none') {
                    loaderUI.style.opacity = '0';
                    setTimeout(() => loaderUI.style.display = 'none', 200);
                }
            }, 8000);

            const loader = new GLTFLoader();
            loader.load('./teacher.glb', function (gltf) {
                clearTimeout(fallbackTimeout);
                const model = gltf.scene;

                morphMeshes = [];

                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = false;
                        child.receiveShadow = false;
                        if (child.material) {
                            child.material.roughness = 0.5;
                            child.material.metalness = 0.0;
                        }
                        // Cache all meshes with morph targets
                        if (child.morphTargetInfluences && child.morphTargetDictionary) {
                            morphMeshes.push(child);
                        }
                    }
                    if (child.isBone) {
                        initialBoneRotations.set(child.uuid, child.rotation.clone());
                        
                        const name = child.name.toLowerCase();

                        if (name.includes('jaw') || name.includes('lowerjaw') || name.includes('mouth')) jawBone = child;

                        if ((name.includes('spine') && !name.includes('spine1') && !name.includes('spine2')) || name.includes('chest')) bodyBones.spine = child;
                        if (name.includes('spine1') || name.includes('spine_1')) bodyBones.spine1 = child;
                        if (name.includes('spine2') || name.includes('upperchest')) bodyBones.spine2 = child;

                        if (name.includes('neck')) bodyBones.neck = child;
                        if (name.includes('head') && !name.includes('headtop') && !name.includes('head_end')) bodyBones.head = child;

                        if (name.includes('leftshoulder') || name.includes('left_shoulder') || name.includes('lshoulder')) bodyBones.leftShoulder = child;
                        if (name.includes('rightshoulder') || name.includes('right_shoulder') || name.includes('rshoulder')) bodyBones.rightShoulder = child;
                        if ((name.includes('leftarm') || name.includes('left_arm') || name.includes('larm') || name.includes('upperarm_l')) && !name.includes('forearm')) bodyBones.leftArm = child;
                        if ((name.includes('rightarm') || name.includes('right_arm') || name.includes('rarm') || name.includes('upperarm_r')) && !name.includes('forearm')) bodyBones.rightArm = child;
                        if (name.includes('leftforearm') || name.includes('left_forearm') || name.includes('lforearm') || name.includes('forearm_l')) bodyBones.leftForeArm = child;
                        if (name.includes('rightforearm') || name.includes('right_forearm') || name.includes('rforearm') || name.includes('forearm_r')) bodyBones.rightForeArm = child;
                        if (name.includes('lefthand') || name.includes('left_hand') || name.includes('lhand') || name.includes('hand_l')) bodyBones.leftHand = child;
                        if (name.includes('righthand') || name.includes('right_hand') || name.includes('rhand') || name.includes('hand_r')) bodyBones.rightHand = child;

                        if (name.includes('leftupleg') || name.includes('left_leg') || name.includes('leftthigh') || name.includes('upleg_l')) bodyBones.leftUpLeg = child;
                        if (name.includes('rightupleg') || name.includes('right_leg') || name.includes('rightthigh') || name.includes('upleg_r')) bodyBones.rightUpLeg = child;
                    }
                });

                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const targetHeight = 2.2;
                const scale = targetHeight / (size.y || 1);
                model.scale.set(scale, scale, scale);
                
                const scaledBox = new THREE.Box3().setFromObject(model);
                const center = scaledBox.getCenter(new THREE.Vector3());
                
                model.position.x = -center.x;
                model.position.y = -center.y - 0.5;
                model.position.z = -center.z;

                modelGroup.add(model);

                loaderUI.style.opacity = '0';
                setTimeout(() => loaderUI.style.display = 'none', 200);
            }, 
            function (xhr) {
                if (xhr.total) {
                    const percent = Math.round((xhr.loaded / xhr.total) * 100);
                    loadingStatus.innerText = `Loading Mr. Amrit Engine (${percent}%)...`;
                } else {
                    loadingStatus.innerText = `Streaming Virtual Classroom...`;
                }
            },
            function (error) {
                console.error(error);
                clearTimeout(fallbackTimeout);
                loaderUI.style.opacity = '0';
                setTimeout(() => loaderUI.style.display = 'none', 200);
            });

            const resizeObserver = new ResizeObserver(() => {
                const width = container.clientWidth;
                const height = container.clientHeight;
                camera.aspect = width / height;
                updateCameraPosition();
                camera.updateProjectionMatrix();
                renderer.setSize(width, height);
            });
            resizeObserver.observe(container);
        }

        function updateCameraPosition() {
            if (container.clientWidth < 768) {
                camera.position.set(0, 1.2, 12.65);
            } else {
                camera.position.set(0, 1.2, 10.95);
            }
        }

        /* ==========================================
           AUDIO-DRIVEN LIPSYNC
           Real amplitude from AnalyserNode drives jaw.
           Organic micro-oscillators add human-like variation
           on top of the clean audio signal so it never looks robotic.
        ========================================== */
        function updateLipSync(dt) {
            if (!isSpeaking || !lipsyncFromAudio) {
                // Mouth closes smoothly when not speaking
                lipSync.smoothed = THREE.MathUtils.lerp(lipSync.smoothed, 0, dt * 14);
                return;
            }

            // --- Real audio amplitude ---
            const rawAmplitude = getAudioAmplitude(); // 0 to 1

            // --- Layer 1: Micro-rhythm oscillator (adds syllabic texture) ---
            // This makes the mouth feel like it's forming words, not just
            // opening/closing proportionally to volume
            lipSync.phase1 += dt * 6.5;
            const rhythmMod = (Math.sin(lipSync.phase1 * Math.PI) * 0.5 + 0.5); // 0 to 1

            // --- Layer 2: Vowel-peak oscillator (slow wide opens) ---
            lipSync.phase2 += dt * 2.1;
            const vowelMod = Math.pow(Math.max(0, Math.sin(lipSync.phase2)), 2) * 0.2;

            // --- Combine: audio amplitude is dominant, oscillators add texture ---
            // When audio is loud → mouth wide open (real audio)
            // When audio is quiet → micro-movements from oscillators prevent dead stillness
            const baseOpen = rawAmplitude;
            const textureAdd = rawAmplitude > 0.05
                ? rhythmMod * rawAmplitude * 0.35 + vowelMod
                : 0;

            const target = Math.min(1.0, baseOpen + textureAdd);

            // Asymmetric smoothing: jaw drops fast, rises slowly (like real jaw physics)
            const openSpeed = target > lipSync.smoothed ? 28 : 16;
            lipSync.smoothed = THREE.MathUtils.lerp(lipSync.smoothed, target, dt * openSpeed);
        }

        /* ==========================================
           GESTURE ENGINE
        ========================================== */
        function pickNewGesture(time) {
            gesture.gesturePhase = Math.floor(Math.random() * 7);
            gesture.nextGestureTime = time + 0.8 + Math.random() * 1.8;

            switch (gesture.gesturePhase) {
                case 0: // REST
                    gesture.tLArmZ = 0.05 + Math.random() * 0.05;
                    gesture.tRArmZ = -(0.05 + Math.random() * 0.05);
                    gesture.tLForeArmX = -0.1 - Math.random() * 0.15;
                    gesture.tRForeArmX = -0.1 - Math.random() * 0.15;
                    gesture.tLForeArmZ = 0;
                    gesture.tRForeArmZ = 0;
                    gesture.tSpineX = 0;
                    gesture.tSpineY = (Math.random() - 0.5) * 0.05;
                    gesture.tSpine1X = 0;
                    gesture.tNeckX = (Math.random() - 0.5) * 0.04;
                    gesture.tHeadY = (Math.random() - 0.5) * 0.06;
                    gesture.tHeadX = 0;
                    break;

                case 1: // POINT LEFT
                    gesture.tLArmZ = 0.05;
                    gesture.tRArmZ = -0.35 - Math.random() * 0.1;
                    gesture.tRForeArmX = -0.7 - Math.random() * 0.2;
                    gesture.tRForeArmZ = -0.2;
                    gesture.tLForeArmX = -0.1;
                    gesture.tLForeArmZ = 0;
                    gesture.tSpineY = -0.08;
                    gesture.tSpine1X = 0.05;
                    gesture.tNeckX = 0.03;
                    gesture.tHeadY = -0.06;
                    gesture.tHeadX = 0.02;
                    break;

                case 2: // POINT RIGHT
                    gesture.tRArmZ = -0.05;
                    gesture.tLArmZ = 0.35 + Math.random() * 0.1;
                    gesture.tLForeArmX = -0.7 - Math.random() * 0.2;
                    gesture.tLForeArmZ = 0.2;
                    gesture.tRForeArmX = -0.1;
                    gesture.tRForeArmZ = 0;
                    gesture.tSpineY = 0.08;
                    gesture.tSpine1X = 0.05;
                    gesture.tNeckX = 0.03;
                    gesture.tHeadY = 0.06;
                    gesture.tHeadX = 0.02;
                    break;

                case 3: // OPEN BOTH HANDS
                    gesture.tLArmZ = 0.22 + Math.random() * 0.08;
                    gesture.tRArmZ = -(0.22 + Math.random() * 0.08);
                    gesture.tLForeArmX = -0.6 - Math.random() * 0.2;
                    gesture.tRForeArmX = -0.6 - Math.random() * 0.2;
                    gesture.tLForeArmZ = 0.1;
                    gesture.tRForeArmZ = -0.1;
                    gesture.tLHandX = 0.2;
                    gesture.tRHandX = 0.2;
                    gesture.tSpineX = 0.04;
                    gesture.tSpineY = 0;
                    gesture.tNeckX = 0.02;
                    gesture.tHeadX = 0.03;
                    gesture.tHeadY = 0;
                    break;

                case 4: // LEAN FORWARD
                    gesture.tSpine1X = 0.12;
                    gesture.tSpineX = 0.06;
                    gesture.tNeckX = -0.04;
                    gesture.tHeadX = -0.02;
                    gesture.tLArmZ = 0.15;
                    gesture.tRArmZ = -0.15;
                    gesture.tLForeArmX = -0.5;
                    gesture.tRForeArmX = -0.5;
                    gesture.tSpineY = (Math.random() - 0.5) * 0.04;
                    gesture.tHeadY = (Math.random() - 0.5) * 0.04;
                    break;

                case 5: // NOD
                    gesture.tHeadX = 0.08 + Math.random() * 0.06;
                    gesture.tNeckX = 0.04;
                    gesture.tLArmZ = 0.08;
                    gesture.tRArmZ = -0.08;
                    gesture.tLForeArmX = -0.2;
                    gesture.tRForeArmX = -0.2;
                    gesture.tSpineY = (Math.random() - 0.5) * 0.03;
                    gesture.tHeadY = (Math.random() - 0.5) * 0.04;
                    gesture.tSpine1X = 0.02;
                    break;

                case 6: // ONE HAND RAISED
                    if (Math.random() > 0.5) {
                        gesture.tRForeArmX = -0.9 - Math.random() * 0.2;
                        gesture.tRArmZ = -0.18;
                        gesture.tLForeArmX = -0.1;
                        gesture.tLArmZ = 0.05;
                    } else {
                        gesture.tLForeArmX = -0.9 - Math.random() * 0.2;
                        gesture.tLArmZ = 0.18;
                        gesture.tRForeArmX = -0.1;
                        gesture.tRArmZ = -0.05;
                    }
                    gesture.tSpineY = (Math.random() - 0.5) * 0.06;
                    gesture.tSpine1X = 0.03;
                    gesture.tNeckX = 0.02;
                    gesture.tHeadX = 0.02;
                    gesture.tHeadY = (Math.random() - 0.5) * 0.05;
                    break;
            }
        }

        function smoothLerp(current, target, speed, dt) {
            return THREE.MathUtils.lerp(current, target, 1 - Math.exp(-speed * dt));
        }

        function updateGestures(dt, time) {
            const lerpSpeed = isSpeaking ? 3.5 : 2.0;

            if (isSpeaking) {
                if (time >= gesture.nextGestureTime) {
                    pickNewGesture(time);
                }
            } else {
                gesture.tLArmZ = 0.04;
                gesture.tRArmZ = -0.04;
                gesture.tLForeArmX = 0;
                gesture.tRForeArmX = 0;
                gesture.tLForeArmZ = 0;
                gesture.tRForeArmZ = 0;
                gesture.tLHandX = 0;
                gesture.tRHandX = 0;
                gesture.tSpineX = 0;
                gesture.tSpineY = 0;
                gesture.tSpine1X = 0;
                gesture.tNeckX = 0;
                gesture.tNeckY = 0;
                gesture.tHeadX = 0;
                gesture.tHeadY = 0;
                gesture.tHeadZ = 0;
            }

            gesture.lArmZ = smoothLerp(gesture.lArmZ, gesture.tLArmZ, lerpSpeed, dt);
            gesture.rArmZ = smoothLerp(gesture.rArmZ, gesture.tRArmZ, lerpSpeed, dt);
            gesture.lForeArmX = smoothLerp(gesture.lForeArmX, gesture.tLForeArmX, lerpSpeed * 1.2, dt);
            gesture.rForeArmX = smoothLerp(gesture.rForeArmX, gesture.tRForeArmX, lerpSpeed * 1.2, dt);
            gesture.lForeArmZ = smoothLerp(gesture.lForeArmZ, gesture.tLForeArmZ, lerpSpeed, dt);
            gesture.rForeArmZ = smoothLerp(gesture.rForeArmZ, gesture.tRForeArmZ, lerpSpeed, dt);
            gesture.lHandX = smoothLerp(gesture.lHandX, gesture.tLHandX, lerpSpeed, dt);
            gesture.rHandX = smoothLerp(gesture.rHandX, gesture.tRHandX, lerpSpeed, dt);
            gesture.spineX = smoothLerp(gesture.spineX, gesture.tSpineX, lerpSpeed * 0.7, dt);
            gesture.spineY = smoothLerp(gesture.spineY, gesture.tSpineY, lerpSpeed * 0.7, dt);
            gesture.spine1X = smoothLerp(gesture.spine1X, gesture.tSpine1X, lerpSpeed * 0.7, dt);
            gesture.neckX = smoothLerp(gesture.neckX, gesture.tNeckX, lerpSpeed, dt);
            gesture.neckY = smoothLerp(gesture.neckY, gesture.tNeckY, lerpSpeed, dt);
            gesture.headX = smoothLerp(gesture.headX, gesture.tHeadX, lerpSpeed * 1.3, dt);
            gesture.headY = smoothLerp(gesture.headY, gesture.tHeadY, lerpSpeed * 1.3, dt);
        }

        function updateBlinking(dt) {
            blink.nextBlinkTime -= dt;
            if (blink.nextBlinkTime <= 0 && blink.state === 0) {
                blink.state = 1;
                blink.nextBlinkTime = 2.0 + Math.random() * 4.0;
                if (Math.random() < 0.15) blink.nextBlinkTime = 0.15;
            }

            if (blink.state === 1) {
                blink.value += dt * blink.blinkSpeed;
                if (blink.value >= 1) { blink.value = 1; blink.state = 2; }
            } else if (blink.state === 2) {
                blink.value -= dt * blink.blinkSpeed * 0.7;
                if (blink.value <= 0) { blink.value = 0; blink.state = 0; }
            }
        }

        function applyBonePose(bone, rotX, rotY, rotZ) {
            if (!bone) return;
            const init = initialBoneRotations.get(bone.uuid);
            if (!init) return;
            if (rotX !== undefined) bone.rotation.x = init.x + rotX;
            if (rotY !== undefined) bone.rotation.y = init.y + rotY;
            if (rotZ !== undefined) bone.rotation.z = init.z + rotZ;
        }

        function applyMorphTarget(name, value) {
            for (const mesh of morphMeshes) {
                const idx = mesh.morphTargetDictionary[name];
                if (idx !== undefined) {
                    mesh.morphTargetInfluences[idx] = Math.max(0, Math.min(1, value));
                }
            }
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            const dt = Math.min(clock.getDelta(), 0.05);
            const time = clock.getElapsedTime();

            controls.target.lerp(absoluteCenterTarget, 0.1);

            if (modelGroup && modelGroup.children.length > 0) {

                // ---- BREATHING ----
                breath.phase += dt * 0.28;
                const breathSin = Math.sin(breath.phase * Math.PI * 2);
                const breathBob = breathSin * 0.003;
                
                // ---- LIPSYNC UPDATE (real audio driven) ----
                updateLipSync(dt);

                // ---- GESTURE UPDATE ----
                updateGestures(dt, time);

                // ---- BLINK UPDATE ----
                updateBlinking(dt);

                // ---- BODY BOB ----
                modelGroup.position.y = -0.5 + breathBob + (isSpeaking ? Math.sin(time * 3.5) * 0.003 : 0);

                // ---- SPINE / TORSO ----
                applyBonePose(bodyBones.spine,
                    gesture.spineX + breathSin * 0.008,
                    gesture.spineY,
                    0
                );
                applyBonePose(bodyBones.spine1,
                    gesture.spine1X + breathSin * 0.006,
                    0,
                    0
                );

                // ---- HEAD / NECK ----
                applyBonePose(bodyBones.neck, gesture.neckX, gesture.neckY, 0);
                applyBonePose(bodyBones.head, gesture.headX, gesture.headY, 0);

                // ---- ARMS ----
                applyBonePose(bodyBones.leftArm, 0, 0, gesture.lArmZ);
                applyBonePose(bodyBones.rightArm, 0, 0, gesture.rArmZ);
                applyBonePose(bodyBones.leftForeArm, gesture.lForeArmX, 0, gesture.lForeArmZ);
                applyBonePose(bodyBones.rightForeArm, gesture.rForeArmX, 0, gesture.rForeArmZ);
                applyBonePose(bodyBones.leftHand, gesture.lHandX, 0, 0);
                applyBonePose(bodyBones.rightHand, gesture.rHandX, 0, 0);

                // ---- LEGS (breathing only) ----
                applyBonePose(bodyBones.leftUpLeg, 0, 0, breathSin * 0.012);
                applyBonePose(bodyBones.rightUpLeg, 0, 0, breathSin * 0.012);

                // ============================
                // APPLY JAW / LIPSYNC
                // ============================
                const jawAmount = lipSync.smoothed * 0.28; // max ~16° = realistic jaw open

                if (jawBone) {
                    // Bone-based jaw
                    jawBone.rotation.x = jawAmount;
                }

                // Morph target lipsync (visemes + jawOpen)
                // jawOpen: direct mapping to amplitude
                applyMorphTarget('jawOpen', lipSync.smoothed);
                applyMorphTarget('mouthOpen', lipSync.smoothed);

                // Viseme shapes: layer vowel shapes on top
                // viseme_aa (wide open: A sound) peaks when mouth wide
                // viseme_O (rounded: O sound) peaks slightly later
                const aa = Math.pow(lipSync.smoothed, 0.7);
                const oh = Math.pow(lipSync.smoothed, 1.2) * Math.max(0, Math.sin(lipSync.phase2));
                applyMorphTarget('viseme_aa', aa * 0.8);
                applyMorphTarget('viseme_A', aa * 0.8);
                applyMorphTarget('viseme_O', oh * 0.5);
                applyMorphTarget('viseme_oh', oh * 0.5);
                applyMorphTarget('viseme_E', lipSync.smoothed * 0.4);

                // ============================
                // APPLY BLINKING
                // ============================
                applyMorphTarget('eyeBlinkLeft', blink.value);
                applyMorphTarget('eyeBlinkRight', blink.value);
                applyMorphTarget('EyeBlinkLeft', blink.value);
                applyMorphTarget('EyeBlinkRight', blink.value);
                applyMorphTarget('blink_left', blink.value);
                applyMorphTarget('blink_right', blink.value);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        /* ==========================================
           UI CONTROLS & HANDLERS
        ========================================== */
        const btnFullscreen = document.getElementById('btn-fullscreen');
        const btnSound = document.getElementById('btn-sound');
        const btnMic = document.getElementById('btn-mic');
        const btnCloseLesson = document.getElementById('btn-close-lesson');
        
        let soundEnabled = true;

        btnSound.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            btnSound.classList.toggle('active-state');
            if (!soundEnabled) {
                stopCurrentAudio();
                isSpeaking = false;
            }
        });

        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                wrapper.requestFullscreen().catch(err => console.warn(err));
            } else {
                document.exitFullscreen();
            }
        });

        btnCloseLesson.addEventListener('click', () => setIdleMode());

        function setTeachingMode() {
            isTeachingMode = true;
            wrapper.classList.add('teaching-mode');
            uiModeBadge.innerText = "TEACHING MODE";
            uiModeBadge.style.background = "rgba(255, 59, 48, 0.1)";
            uiModeBadge.style.color = "var(--danger)";
            document.getElementById('status-text').innerText = "SPEAKING";
        }

        function setIdleMode() {
            isTeachingMode = false;
            wrapper.classList.remove('teaching-mode');
            uiModeBadge.innerText = "IDLE MODE";
            uiModeBadge.style.background = "var(--accent-glow)";
            uiModeBadge.style.color = "var(--accent-color)";
            document.getElementById('status-text').innerText = "IDLE";
            stopCurrentAudio();
            isSpeaking = false;
            lipsyncFromAudio = false;
        }

        /* ==========================================
           CHAT PIPELINE ENGINE
        ========================================== */
        const chatText = document.getElementById('chat-text');
        const audioWave = document.getElementById('audio-wave');
        const lessonBody = document.getElementById('lesson-body');
        const searchInput = document.getElementById('ai-search-input');
        const btnSendText = document.getElementById('btn-send-text');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isEngineProcessing = false;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                btnMic.classList.add('active-state');
                document.getElementById('status-text').innerText = "LISTENING";
                chatText.innerHTML = currentLangCode === 'hi-IN' ? "सुन रहा हूँ... बोलिए।" : "Listening... Speak now.";
                audioWave.classList.add('listening');
            };

            recognition.onresult = (event) => {
                if (isSpeaking || isEngineProcessing) return;
                const transcript = event.results[0][0].transcript.trim();
                if (transcript.length > 2) {
                    handleUserQuery(transcript);
                }
            };

            recognition.onerror = (e) => { resetMicState(); };
            recognition.onend = () => { resetMicState(); };
        } else {
            chatText.innerHTML = "Your browser doesn't support Voice AI. Please use Chrome.";
        }

        function resetMicState() {
            btnMic.classList.remove('active-state');
            audioWave.classList.remove('listening');
            if (!isEngineProcessing && !isSpeaking) {
                document.getElementById('status-text').innerText = "IDLE";
            }
        }

        btnMic.addEventListener('click', () => {
            // Resume AudioContext on user gesture (required by browsers)
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            if (recognition && !isSpeaking && !isEngineProcessing) {
                try { recognition.start(); } catch(e) {}
            }
        });

        function submitSearchQuery() {
            const query = searchInput.value.trim();
            if (query.length > 0 && !isEngineProcessing && !isSpeaking) {
                searchInput.value = '';
                handleUserQuery(query);
            }
        }

        btnSendText.addEventListener('click', () => {
            // Resume AudioContext on user gesture
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            else getAudioContext(); // initialize on first click
            submitSearchQuery();
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                getAudioContext();
                submitSearchQuery();
            }
        });

        async function handleUserQuery(query) {
            isEngineProcessing = true;
            try { recognition.stop(); } catch(e) {}
            
            chatText.innerHTML = `<strong>You:</strong> ${query}`;
            
            setTeachingMode();
            lessonBody.innerHTML = `<span style="color:var(--text-muted); font-size:12px;">Thinking...</span>`;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: {
                            parts: [{ text: `You are Mr Amrit, an elite AI virtual teacher. Format responses into a single brief clean actionable explanation paragraph. Do not use asterisks or markdown. Always reply strictly in ${geminiPromptLang} language.` }]
                        },
                        contents: [{ parts: [{ text: query }] }]
                    })
                });

                if (!response.ok) throw new Error("Network Response Fail");
                
                const data = await response.json();
                const aiResponseText = data.candidates[0].content.parts[0].text;
                
                await streamResponseIntoCards(aiResponseText);

            } catch (error) {
                console.error(error);
                chatText.innerHTML = `<strong style="color:var(--danger)">Connection failed. Trying again...</strong>`;
                setIdleMode();
                isEngineProcessing = false;
            }
        }

        async function streamResponseIntoCards(text) {
            lessonBody.innerHTML = "";

            // Start ElevenLabs TTS (non-blocking — streams text display while audio loads)
            const speakPromise = soundEnabled ? speakText(text) : Promise.resolve();

            const card = document.createElement('div');
            card.className = 'teaching-card';
            lessonBody.appendChild(card);
            
            const tokens = text.split(/(\s+)/);
            let structuredOutput = "";
            
            for (let token of tokens) {
                structuredOutput += token;
                card.innerHTML = structuredOutput;
                lessonBody.scrollTop = lessonBody.scrollHeight;
                await new Promise(resolve => setTimeout(resolve, 35));
            }

            // Wait for speech to finish (speakText handles isEngineProcessing = false internally)
            await speakPromise;
        }

        // Initialize AudioContext early on any page interaction
        document.addEventListener('click', () => {
            if (!audioCtx) getAudioContext();
        }, { once: true });

    </script>
</body>
</html>
