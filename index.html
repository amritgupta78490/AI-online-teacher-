<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Teacher - Mr. Amrit Virtual Classroom</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #FFFFFF;
            --surface-color: rgba(255, 255, 255, 0.85);
            --surface-solid: #FFFFFF;
            --text-main: #1D1D1F;
            --text-muted: #86868B;
            --accent-color: #0066CC;
            --accent-glow: rgba(0, 102, 204, 0.1);
            --danger: #FF3B30;
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
            --border-radius-sm: 12px;
            --transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch; 
        }

        .glass {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }

        #lang-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--surface-solid);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            transition: opacity 0.5s ease;
        }

        .lang-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            text-align: center;
        }

        .lang-options {
            display: flex;
            gap: 20px;
        }

        .lang-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 20px var(--accent-glow);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .lang-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 102, 204, 0.3);
        }

        .app-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
            box-sizing: border-box;
            gap: 16px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-radius: var(--border-radius-lg);
            z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }

        .live-badge {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255, 59, 48, 0.1); color: var(--danger);
            padding: 4px 12px; border-radius: 20px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
        }

        .live-dot {
            width: 6px; height: 6px; background: var(--danger); border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 59, 48, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .teacher-info h1 { font-size: 16px; font-weight: 600; }
        .teacher-info p { font-size: 12px; color: var(--text-muted); }

        .header-right { display: flex; align-items: center; gap: 12px; }
        
        .mode-indicator {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-color);
            background: var(--accent-glow);
            padding: 6px 12px;
            border-radius: 12px;
        }

        .video-section {
            width: 100%; 
            height: 55vh; 
            min-height: 340px;
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .canvas-wrapper {
            position: relative; 
            width: 100%; 
            height: 100%;
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            background: #FFFFFF; 
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.03);
        }
        
        #canvas-container { width: 100%; height: 100%; display: block; }

        #loader {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: #FFFFFF; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #f0f0f5; border-top: 3px solid var(--accent-color);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        #lesson-panel {
            position: absolute;
            bottom: 16px; left: 50%;
            transform: translateX(-50%) translateY(130%);
            width: 92%;
            max-width: 550px;
            border-radius: var(--border-radius-md);
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.08);
            display: flex; flex-direction: column;
            opacity: 0;
            transition: var(--transition);
            z-index: 10;
            max-height: 150px;
        }

        .canvas-wrapper.teaching-mode #lesson-panel {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .lesson-header {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }

        .lesson-header h3 {
            font-size: 11px; font-weight: 700;
            color: var(--accent-color); text-transform: uppercase;
            display: flex; align-items: center; gap: 6px;
        }

        .btn-close-lesson {
            background: #f0f0f5; border: none; width: 20px; height: 20px;
            border-radius: 50%; font-size: 12px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            color: var(--text-muted);
        }

        .lesson-body { flex-grow: 1; padding: 12px; overflow-y: auto; }
        .teaching-card { font-size: 13.5px; line-height: 1.5; color: var(--text-main); }

        .interaction-area {
            display: flex; flex-direction: column; gap: 12px;
            max-width: 900px; width: 100%; margin: 0 auto;
        }

        .controls-bar {
            display: flex; justify-content: center; gap: 14px;
            padding: 8px; border-radius: var(--border-radius-lg);
        }

        .search-bar-container {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 16px; border-radius: var(--border-radius-lg);
        }

        #ai-search-input {
            flex-grow: 1; border: none; background: transparent; outline: none;
            font-size: 14px; color: var(--text-main); font-family: 'Inter', sans-serif;
        }

        #ai-search-input::placeholder { color: var(--text-muted); }

        .icon-btn {
            background: var(--surface-solid); border: 1px solid rgba(0,0,0,0.05);
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.3s;
        }

        .icon-btn:hover { transform: translateY(-2px); }
        .icon-btn svg { width: 18px; height: 18px; fill: currentColor; }
        
        .icon-btn.active-state { background: var(--accent-color); color: white; }
        .icon-btn.active-state svg { fill: white; }

        .chat-display {
            padding: 12px 16px; border-radius: var(--border-radius-lg);
            min-height: 54px; max-height: 74px; overflow-y: auto;
            font-size: 13.5px;
        }

        .ai-label {
            font-size: 10px; font-weight: 700; color: var(--accent-color);
            text-transform: uppercase; margin-bottom: 2px; display: flex; align-items: center; gap: 6px;
        }

        .waveform { display: flex; align-items: center; gap: 2px; height: 10px; opacity: 0; transition: opacity 0.3s; }
        .bar {
            width: 2px; background-color: var(--danger); border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }
        .bar:nth-child(1) { height: 40%; animation-delay: 0.0s; }
        .bar:nth-child(2) { height: 80%; animation-delay: 0.2s; }
        .bar:nth-child(3) { height: 100%; animation-delay: 0.4s; }
        .bar:nth-child(4) { height: 60%; animation-delay: 0.6s; }
        @keyframes wave { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1); } }
        
        .waveform.speaking { opacity: 1; }
        .waveform.speaking .bar { background-color: var(--accent-color); }
        .waveform.listening { opacity: 1; }
        .waveform.listening .bar { background-color: var(--danger); }

        @media (max-width: 768px) {
            .app-layout { padding: 12px; gap: 12px; }
            .video-section { height: 48vh; }
            #lesson-panel { width: 94%; bottom: 12px; }
            .lang-options { flex-direction: column; width: 80%; }
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="lang-overlay">
        <div class="lang-title">Choose your language<br><span style="font-size: 20px; color: var(--text-muted);">अपनी भाषा चुनें</span></div>
        <div class="lang-options">
            <button class="lang-btn" onclick="startGame('en-US')">English</button>
            <button class="lang-btn" onclick="startGame('hi-IN')">हिंदी (Hindi)</button>
        </div>
    </div>

    <div class="app-layout">
        
        <header class="glass">
            <div class="header-left">
                <div class="live-badge">
                    <div class="live-dot"></div> LIVE
                </div>
                <div class="teacher-info">
                    <h1>Mr. Amrit</h1>
                    <p>AI EdTech Platform</p>
                </div>
            </div>
            <div class="header-right">
                <span class="mode-indicator" id="ui-mode-badge">IDLE MODE</span>
            </div>
        </header>

        <section class="video-section">
            <div class="canvas-wrapper" id="video-wrapper">
                
                <div id="loader">
                    <div class="spinner"></div>
                    <div id="loading-status" style="font-size: 13px; color: #666; font-weight: 500;">Loading Mr. Amrit...</div>
                </div>

                <div id="canvas-container"></div>
                
                <div id="lesson-panel">
                    <div class="lesson-header">
                        <h3><div class="live-dot" style="background:var(--accent-color);"></div> AI Explanation</h3>
                        <button class="btn-close-lesson" id="btn-close-lesson" title="Clear">&times;</button>
                    </div>
                    <div class="lesson-body" id="lesson-body"></div>
                </div>
            </div>
        </section>

        <section class="interaction-area">
            
            <div class="controls-bar glass">
                <button class="icon-btn" id="btn-fullscreen" title="Fullscreen Class">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
                <button class="icon-btn" id="btn-mic" title="Click to Speak">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
                </button>
                <button class="icon-btn active-state" id="btn-sound" title="Toggle AI Voice">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
            </div>

            <div class="search-bar-container glass">
                <input type="text" id="ai-search-input" placeholder="Type your question here...">
                <button class="icon-btn" id="btn-send-text" title="Send Text" style="width: 36px; height: 36px;">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>

            <div class="chat-display glass">
                <div class="ai-label">
                    <span id="status-text">IDLE</span> 
                    <div class="waveform" id="audio-wave">
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    </div>
                </div>
                <p id="chat-text" style="color: var(--text-muted);">Please select a language to start...</p>
            </div>

        </section>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const GEMINI_API_KEY = "AIzaSyDC3vs-oTy2ff_eJXS_MRd_4oN3AMdnxBs";
        
        let currentLangCode = 'en-US';
        let geminiPromptLang = 'English';

        window.startGame = function(langCode) {
            document.getElementById('lang-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('lang-overlay').style.display = 'none';
            }, 500);

            currentLangCode = langCode;
            geminiPromptLang = langCode === 'hi-IN' ? 'Hindi' : 'English';
            
            if (recognition) {
                recognition.lang = currentLangCode;
            }

            const greetingText = langCode === 'hi-IN' ? "नमस्ते, मैं मिस्टर अमृत हूँ। आप माइक बटन दबाकर अपना सवाल पूछ सकते हैं।" : "Hello, I am Mr. Amrit. Click the mic button to ask me a question.";
            
            document.getElementById('chat-text').innerText = langCode === 'hi-IN' ? "बोलने के लिए माइक बटन पर क्लिक करें..." : "Click the mic button to speak...";
            document.getElementById('ai-search-input').placeholder = langCode === 'hi-IN' ? "अपना सवाल यहाँ टाइप करें..." : "Type your question here...";

            speakText(greetingText);
        }

        /* ==========================================
           THREE.JS SCENE SETUP
        ========================================== */
        let scene, camera, renderer, controls, clock, modelGroup;
        
        let jawBone = null;
        let bodyBones = {
            spine: null, spine1: null, spine2: null,
            neck: null, head: null,
            leftShoulder: null, rightShoulder: null,
            leftArm: null, rightArm: null,
            leftForeArm: null, rightForeArm: null,
            leftHand: null, rightHand: null,
            leftUpLeg: null, rightUpLeg: null
        };
        const initialBoneRotations = new Map();
        
        const container = document.getElementById('canvas-container');
        const wrapper = document.getElementById('video-wrapper');
        const loaderUI = document.getElementById('loader');
        const loadingStatus = document.getElementById('loading-status');

        let isTeachingMode = false;
        let isSpeaking = false;

        // ==========================================
        // ADVANCED LIPSYNC ENGINE
        // ==========================================
        // We track multiple independent oscillators to simulate real speech
        // Real speech = fast consonant bursts + wide vowel peaks + micro pauses
        let lipSync = {
            raw: 0,           // raw computed target
            smoothed: 0,      // smoothed output applied to jaw
            // Phase accumulators for each oscillator layer
            phase1: 0,        // syllable layer (~5-8 syllables/sec)
            phase2: 0,        // vowel peak layer (~2-3 Hz)
            phase3: 0,        // micro stutter layer (rapid small)
            pauseTimer: 0,    // counts down to next micro-pause
            pauseDuration: 0, // how long current pause lasts
            inPause: false,
        };

        // ==========================================
        // ADVANCED BODY GESTURE ENGINE
        // ==========================================
        // Teacher gestures: head nods, hand raises, lean forward/back
        // We have multiple gesture "states" that blend organically
        let gesture = {
            // Current smoothed bone offsets
            lArmZ: 0, rArmZ: 0,
            lForeArmX: 0, rForeArmX: 0,
            lForeArmZ: 0, rForeArmZ: 0,
            lHandX: 0, rHandX: 0,
            spineX: 0, spineY: 0, spineZ: 0,
            spine1X: 0,
            neckX: 0, neckY: 0,
            headX: 0, headY: 0, headZ: 0,
            // Targets (randomized periodically)
            tLArmZ: 0, tRArmZ: 0,
            tLForeArmX: 0, tRForeArmX: 0,
            tLForeArmZ: 0, tRForeArmZ: 0,
            tLHandX: 0, tRHandX: 0,
            tSpineX: 0, tSpineY: 0, tSpineZ: 0,
            tSpine1X: 0,
            tNeckX: 0, tNeckY: 0,
            tHeadX: 0, tHeadY: 0, tHeadZ: 0,
            // Gesture phase counter
            nextGestureTime: 0,
            gesturePhase: 0,        // 0=rest, 1=point-left, 2=point-right, 3=open-both, 4=lean-explain, 5=nod
            gestureStep: 0,
        };

        // Blinking system
        let blink = {
            state: 0,           // 0 = open, 1 = closing, 2 = opening
            value: 0,           // 0 = fully open, 1 = fully closed
            nextBlinkTime: 3,   // time until next blink
            blinkSpeed: 8,      // speed of blink
        };

        // Breathing system (gentle idle sway)
        let breath = {
            phase: 0,
            chestPhase: 0,
        };

        const uiModeBadge = document.getElementById('ui-mode-badge');

        const absoluteCenterTarget = new THREE.Vector3(0, 1.1, 0);

        init3D();
        animate3D();

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);
            clock = new THREE.Clock();

            const aspect = container.clientWidth / container.clientHeight;
            camera = new THREE.PerspectiveCamera(42, aspect, 0.1, 100);
            updateCameraPosition();

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.4);
            scene.add(ambientLight);

            const keyLight = new THREE.DirectionalLight(0xffffff, 1.6);
            keyLight.position.set(1, 3, 3);
            scene.add(keyLight);

            // Soft fill light from left
            const fillLight = new THREE.DirectionalLight(0xfff5e0, 0.6);
            fillLight.position.set(-2, 1, 1);
            scene.add(fillLight);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.minDistance = 1.0;
            controls.maxDistance = 25;
            controls.enablePan = false;
            controls.autoRotate = false;
            controls.target.copy(absoluteCenterTarget);

            modelGroup = new THREE.Group();
            scene.add(modelGroup);

            const fallbackTimeout = setTimeout(() => {
                if (loaderUI && loaderUI.style.display !== 'none') {
                    loaderUI.style.opacity = '0';
                    setTimeout(() => loaderUI.style.display = 'none', 200);
                }
            }, 8000);

            const loader = new GLTFLoader();
            loader.load('./teacher.glb', function (gltf) {
                clearTimeout(fallbackTimeout);
                const model = gltf.scene;

                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = false;
                        child.receiveShadow = false;
                        if (child.material) {
                            child.material.roughness = 0.5;
                            child.material.metalness = 0.0;
                        }
                    }
                    if (child.isBone) {
                        initialBoneRotations.set(child.uuid, child.rotation.clone());
                        
                        const name = child.name.toLowerCase();

                        // Jaw / mouth
                        if (name.includes('jaw') || name.includes('lowerjaw') || name.includes('mouth')) jawBone = child;

                        // Spine chain
                        if ((name.includes('spine') && !name.includes('spine1') && !name.includes('spine2')) || name.includes('chest')) bodyBones.spine = child;
                        if (name.includes('spine1') || name.includes('spine_1')) bodyBones.spine1 = child;
                        if (name.includes('spine2') || name.includes('upperchest')) bodyBones.spine2 = child;

                        // Head / neck
                        if (name.includes('neck')) bodyBones.neck = child;
                        if (name.includes('head') && !name.includes('headtop') && !name.includes('head_end')) bodyBones.head = child;

                        // Arms
                        if (name.includes('leftshoulder') || name.includes('left_shoulder') || name.includes('lshoulder')) bodyBones.leftShoulder = child;
                        if (name.includes('rightshoulder') || name.includes('right_shoulder') || name.includes('rshoulder')) bodyBones.rightShoulder = child;
                        if ((name.includes('leftarm') || name.includes('left_arm') || name.includes('larm') || name.includes('upperarm_l')) && !name.includes('forearm')) bodyBones.leftArm = child;
                        if ((name.includes('rightarm') || name.includes('right_arm') || name.includes('rarm') || name.includes('upperarm_r')) && !name.includes('forearm')) bodyBones.rightArm = child;
                        if (name.includes('leftforearm') || name.includes('left_forearm') || name.includes('lforearm') || name.includes('forearm_l')) bodyBones.leftForeArm = child;
                        if (name.includes('rightforearm') || name.includes('right_forearm') || name.includes('rforearm') || name.includes('forearm_r')) bodyBones.rightForeArm = child;
                        if (name.includes('lefthand') || name.includes('left_hand') || name.includes('lhand') || name.includes('hand_l')) bodyBones.leftHand = child;
                        if (name.includes('righthand') || name.includes('right_hand') || name.includes('rhand') || name.includes('hand_r')) bodyBones.rightHand = child;

                        // Legs
                        if (name.includes('leftupleg') || name.includes('left_leg') || name.includes('leftthigh') || name.includes('upleg_l')) bodyBones.leftUpLeg = child;
                        if (name.includes('rightupleg') || name.includes('right_leg') || name.includes('rightthigh') || name.includes('upleg_r')) bodyBones.rightUpLeg = child;
                    }
                });

                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const targetHeight = 2.2;
                const scale = targetHeight / (size.y || 1);
                model.scale.set(scale, scale, scale);
                
                const scaledBox = new THREE.Box3().setFromObject(model);
                const center = scaledBox.getCenter(new THREE.Vector3());
                
                model.position.x = -center.x;
                model.position.y = -center.y - 0.5;
                model.position.z = -center.z;

                modelGroup.add(model);

                loaderUI.style.opacity = '0';
                setTimeout(() => loaderUI.style.display = 'none', 200);
            }, 
            function (xhr) {
                if (xhr.total) {
                    const percent = Math.round((xhr.loaded / xhr.total) * 100);
                    loadingStatus.innerText = `Loading Mr. Amrit Engine (${percent}%)...`;
                } else {
                    loadingStatus.innerText = `Streaming Virtual Classroom...`;
                }
            },
            function (error) {
                console.error(error);
                clearTimeout(fallbackTimeout);
                loaderUI.style.opacity = '0';
                setTimeout(() => loaderUI.style.display = 'none', 200);
            });

            const resizeObserver = new ResizeObserver(() => {
                const width = container.clientWidth;
                const height = container.clientHeight;
                camera.aspect = width / height;
                updateCameraPosition();
                camera.updateProjectionMatrix();
                renderer.setSize(width, height);
            });
            resizeObserver.observe(container);
        }

        function updateCameraPosition() {
            if (container.clientWidth < 768) {
                camera.position.set(0, 1.2, 12.65);
            } else {
                camera.position.set(0, 1.2, 10.95);
            }
        }

        /* ==========================================
           LIPSYNC: Advanced multi-layer simulation
           Layer 1: Syllable rhythm (fast ~6Hz) - base opening/closing
           Layer 2: Vowel peaks (2-3Hz) - wide opens for A/E/O
           Layer 3: Micro-stutters (very fast) - stop consonants
           Layer 4: Natural micro-pauses (random gaps between words)
        ========================================== */
        function updateLipSync(dt) {
            if (!isSpeaking) {
                // Smoothly close mouth
                lipSync.smoothed = THREE.MathUtils.lerp(lipSync.smoothed, 0, dt * 12);
                return;
            }

            // Update pause system
            if (lipSync.inPause) {
                lipSync.pauseTimer -= dt;
                if (lipSync.pauseTimer <= 0) {
                    lipSync.inPause = false;
                    // Schedule next pause (every 1.5 to 3.5 seconds)
                    lipSync.pauseTimer = 1.5 + Math.random() * 2.0;
                }
                // During pause: mouth slowly closes
                lipSync.raw = THREE.MathUtils.lerp(lipSync.raw, 0, dt * 8);
            } else {
                lipSync.pauseTimer -= dt;
                if (lipSync.pauseTimer <= 0) {
                    lipSync.inPause = true;
                    lipSync.pauseDuration = 0.08 + Math.random() * 0.15;
                    lipSync.pauseTimer = lipSync.pauseDuration;
                }

                // Layer 1: Syllable rhythm - the main open/close cycle
                // Real speech: ~4-7 syllables per second
                lipSync.phase1 += dt * (5.5 + Math.sin(lipSync.phase2 * 0.3) * 1.5);
                // Rectified sine = only opens, never goes negative
                const syllable = Math.max(0, Math.sin(lipSync.phase1 * Math.PI));
                // Sharp attack, slow release = realistic jaw movement
                const syllableSharp = Math.pow(syllable, 0.5) * Math.pow(syllable, 2) * 2;
                const syllableVal = Math.min(1, syllableSharp * 0.55);

                // Layer 2: Vowel peaks - wide slow opens
                lipSync.phase2 += dt * 2.3;
                const vowelRaw = Math.sin(lipSync.phase2) * 0.5 + 0.5;
                const vowelPeak = Math.pow(vowelRaw, 3) * 0.5; // Only fire on peaks

                // Layer 3: Micro-variation for natural imperfection
                lipSync.phase3 += dt * 18;
                const micro = (Math.sin(lipSync.phase3) * 0.5 + 0.5) * 0.07;

                // Combine all layers
                lipSync.raw = syllableVal + vowelPeak + micro;
                lipSync.raw = Math.min(1.0, lipSync.raw);
            }

            // Smooth the raw signal for organic jaw movement
            // Fast towards open (jaw drops fast), slow towards close (jaw rises slowly)
            const speed = lipSync.raw > lipSync.smoothed ? 22 : 14;
            lipSync.smoothed = THREE.MathUtils.lerp(lipSync.smoothed, lipSync.raw, dt * speed);
        }

        /* ==========================================
           GESTURE ENGINE: Natural teacher body movement
           Teachers do these things while explaining:
           - Lean slightly forward when making a point
           - Raise one or both hands for emphasis
           - Nod head for confirmation
           - Turn slightly left/right
           - Bend forearm upward when listing things
           - Open palms when explaining broadly
        ========================================== */
        function pickNewGesture(time) {
            gesture.gesturePhase = Math.floor(Math.random() * 7);
            gesture.nextGestureTime = time + 0.8 + Math.random() * 1.8; // 0.8 to 2.6 seconds between gestures

            switch (gesture.gesturePhase) {
                case 0: // REST - arms naturally down, slight sway
                    gesture.tLArmZ = 0.05 + Math.random() * 0.05;
                    gesture.tRArmZ = -(0.05 + Math.random() * 0.05);
                    gesture.tLForeArmX = -0.1 - Math.random() * 0.15;
                    gesture.tRForeArmX = -0.1 - Math.random() * 0.15;
                    gesture.tLForeArmZ = 0;
                    gesture.tRForeArmZ = 0;
                    gesture.tSpineX = 0;
                    gesture.tSpineY = (Math.random() - 0.5) * 0.05;
                    gesture.tSpine1X = 0;
                    gesture.tNeckX = (Math.random() - 0.5) * 0.04;
                    gesture.tHeadY = (Math.random() - 0.5) * 0.06;
                    gesture.tHeadX = 0;
                    break;

                case 1: // POINT LEFT - raise right arm, forearm up, pointing gesture
                    gesture.tLArmZ = 0.05;
                    gesture.tRArmZ = -0.35 - Math.random() * 0.1;
                    gesture.tRForeArmX = -0.7 - Math.random() * 0.2;
                    gesture.tRForeArmZ = -0.2;
                    gesture.tLForeArmX = -0.1;
                    gesture.tLForeArmZ = 0;
                    gesture.tSpineY = -0.08;
                    gesture.tSpine1X = 0.05;
                    gesture.tNeckX = 0.03;
                    gesture.tHeadY = -0.06;
                    gesture.tHeadX = 0.02;
                    break;

                case 2: // POINT RIGHT - raise left arm
                    gesture.tRArmZ = -0.05;
                    gesture.tLArmZ = 0.35 + Math.random() * 0.1;
                    gesture.tLForeArmX = -0.7 - Math.random() * 0.2;
                    gesture.tLForeArmZ = 0.2;
                    gesture.tRForeArmX = -0.1;
                    gesture.tRForeArmZ = 0;
                    gesture.tSpineY = 0.08;
                    gesture.tSpine1X = 0.05;
                    gesture.tNeckX = 0.03;
                    gesture.tHeadY = 0.06;
                    gesture.tHeadX = 0.02;
                    break;

                case 3: // OPEN BOTH HANDS - explaining broadly, both forearms up symmetrically
                    gesture.tLArmZ = 0.22 + Math.random() * 0.08;
                    gesture.tRArmZ = -(0.22 + Math.random() * 0.08);
                    gesture.tLForeArmX = -0.6 - Math.random() * 0.2;
                    gesture.tRForeArmX = -0.6 - Math.random() * 0.2;
                    gesture.tLForeArmZ = 0.1;
                    gesture.tRForeArmZ = -0.1;
                    gesture.tLHandX = 0.2;
                    gesture.tRHandX = 0.2;
                    gesture.tSpineX = 0.04;
                    gesture.tSpineY = 0;
                    gesture.tNeckX = 0.02;
                    gesture.tHeadX = 0.03;
                    gesture.tHeadY = 0;
                    break;

                case 4: // LEAN FORWARD - emphasis, leaning in while explaining a key point
                    gesture.tSpine1X = 0.12;
                    gesture.tSpineX = 0.06;
                    gesture.tNeckX = -0.04;
                    gesture.tHeadX = -0.02;
                    gesture.tLArmZ = 0.15;
                    gesture.tRArmZ = -0.15;
                    gesture.tLForeArmX = -0.5;
                    gesture.tRForeArmX = -0.5;
                    gesture.tSpineY = (Math.random() - 0.5) * 0.04;
                    gesture.tHeadY = (Math.random() - 0.5) * 0.04;
                    break;

                case 5: // NOD - head nods up-down, agreeing/confirming while speaking
                    gesture.tHeadX = 0.08 + Math.random() * 0.06;
                    gesture.tNeckX = 0.04;
                    gesture.tLArmZ = 0.08;
                    gesture.tRArmZ = -0.08;
                    gesture.tLForeArmX = -0.2;
                    gesture.tRForeArmX = -0.2;
                    gesture.tSpineY = (Math.random() - 0.5) * 0.03;
                    gesture.tHeadY = (Math.random() - 0.5) * 0.04;
                    gesture.tSpine1X = 0.02;
                    break;

                case 6: // ONE HAND RAISED - single forearm up, like listing a point
                    if (Math.random() > 0.5) {
                        gesture.tRForeArmX = -0.9 - Math.random() * 0.2;
                        gesture.tRArmZ = -0.18;
                        gesture.tLForeArmX = -0.1;
                        gesture.tLArmZ = 0.05;
                    } else {
                        gesture.tLForeArmX = -0.9 - Math.random() * 0.2;
                        gesture.tLArmZ = 0.18;
                        gesture.tRForeArmX = -0.1;
                        gesture.tRArmZ = -0.05;
                    }
                    gesture.tSpineY = (Math.random() - 0.5) * 0.06;
                    gesture.tSpine1X = 0.03;
                    gesture.tNeckX = 0.02;
                    gesture.tHeadX = 0.02;
                    gesture.tHeadY = (Math.random() - 0.5) * 0.05;
                    break;
            }
        }

        function smoothLerp(current, target, speed, dt) {
            return THREE.MathUtils.lerp(current, target, 1 - Math.exp(-speed * dt));
        }

        function updateGestures(dt, time) {
            const lerpSpeed = isSpeaking ? 3.5 : 2.0;

            if (isSpeaking) {
                if (time >= gesture.nextGestureTime) {
                    pickNewGesture(time);
                }
            } else {
                // Idle: slowly return to natural rest
                gesture.tLArmZ = 0.04;
                gesture.tRArmZ = -0.04;
                gesture.tLForeArmX = 0;
                gesture.tRForeArmX = 0;
                gesture.tLForeArmZ = 0;
                gesture.tRForeArmZ = 0;
                gesture.tLHandX = 0;
                gesture.tRHandX = 0;
                gesture.tSpineX = 0;
                gesture.tSpineY = 0;
                gesture.tSpine1X = 0;
                gesture.tNeckX = 0;
                gesture.tNeckY = 0;
                gesture.tHeadX = 0;
                gesture.tHeadY = 0;
                gesture.tHeadZ = 0;
            }

            // Smooth all gesture values
            gesture.lArmZ = smoothLerp(gesture.lArmZ, gesture.tLArmZ, lerpSpeed, dt);
            gesture.rArmZ = smoothLerp(gesture.rArmZ, gesture.tRArmZ, lerpSpeed, dt);
            gesture.lForeArmX = smoothLerp(gesture.lForeArmX, gesture.tLForeArmX, lerpSpeed * 1.2, dt);
            gesture.rForeArmX = smoothLerp(gesture.rForeArmX, gesture.tRForeArmX, lerpSpeed * 1.2, dt);
            gesture.lForeArmZ = smoothLerp(gesture.lForeArmZ, gesture.tLForeArmZ, lerpSpeed, dt);
            gesture.rForeArmZ = smoothLerp(gesture.rForeArmZ, gesture.tRForeArmZ, lerpSpeed, dt);
            gesture.lHandX = smoothLerp(gesture.lHandX, gesture.tLHandX, lerpSpeed, dt);
            gesture.rHandX = smoothLerp(gesture.rHandX, gesture.tRHandX, lerpSpeed, dt);
            gesture.spineX = smoothLerp(gesture.spineX, gesture.tSpineX, lerpSpeed * 0.7, dt);
            gesture.spineY = smoothLerp(gesture.spineY, gesture.tSpineY, lerpSpeed * 0.7, dt);
            gesture.spine1X = smoothLerp(gesture.spine1X, gesture.tSpine1X, lerpSpeed * 0.7, dt);
            gesture.neckX = smoothLerp(gesture.neckX, gesture.tNeckX, lerpSpeed, dt);
            gesture.neckY = smoothLerp(gesture.neckY, gesture.tNeckY, lerpSpeed, dt);
            gesture.headX = smoothLerp(gesture.headX, gesture.tHeadX, lerpSpeed * 1.3, dt);
            gesture.headY = smoothLerp(gesture.headY, gesture.tHeadY, lerpSpeed * 1.3, dt);
        }

        function updateBlinking(dt, time) {
            blink.nextBlinkTime -= dt;
            if (blink.nextBlinkTime <= 0 && blink.state === 0) {
                blink.state = 1; // start closing
                // Next blink in 2-6 seconds, with occasional double-blink
                blink.nextBlinkTime = 2.0 + Math.random() * 4.0;
                if (Math.random() < 0.15) blink.nextBlinkTime = 0.15; // double blink soon
            }

            if (blink.state === 1) {
                blink.value += dt * blink.blinkSpeed;
                if (blink.value >= 1) {
                    blink.value = 1;
                    blink.state = 2; // now opening
                }
            } else if (blink.state === 2) {
                blink.value -= dt * blink.blinkSpeed * 0.7; // open slightly slower
                if (blink.value <= 0) {
                    blink.value = 0;
                    blink.state = 0; // fully open
                }
            }
        }

        function applyBonePose(bone, key, rotX, rotY, rotZ) {
            if (!bone) return;
            const init = initialBoneRotations.get(bone.uuid);
            if (!init) return;
            if (rotX !== undefined) bone.rotation.x = init.x + rotX;
            if (rotY !== undefined) bone.rotation.y = init.y + rotY;
            if (rotZ !== undefined) bone.rotation.z = init.z + rotZ;
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            const dt = Math.min(clock.getDelta(), 0.05); // cap dt to prevent jumps
            const time = clock.getElapsedTime();

            controls.target.lerp(absoluteCenterTarget, 0.1);

            if (modelGroup && modelGroup.children.length > 0) {

                // ---- BREATHING ----
                breath.phase += dt * 0.28; // ~17 breaths/min = natural adult
                breath.chestPhase += dt * 0.28;
                const breathSin = Math.sin(breath.phase * Math.PI * 2);
                // Breathing bob - very subtle
                const breathBob = breathSin * 0.003;
                
                // ---- LIPSYNC UPDATE ----
                updateLipSync(dt);

                // ---- GESTURE UPDATE ----
                updateGestures(dt, time);

                // ---- BLINK UPDATE ----
                updateBlinking(dt, time);

                // ==========================
                // APPLY BREATHING TO BODY
                // ==========================
                // Very subtle overall body bob
                modelGroup.position.y = -0.5 + breathBob + (isSpeaking ? Math.sin(time * 3.5) * 0.003 : 0);

                // ==========================
                // APPLY SPINE / TORSO
                // ==========================
                applyBonePose(bodyBones.spine, 'spine',
                    gesture.spineX + breathSin * 0.008,
                    gesture.spineY,
                    0
                );
                applyBonePose(bodyBones.spine1, 'spine1',
                    gesture.spine1X + breathSin * 0.006,
                    0,
                    0
                );

                // ==========================
                // APPLY HEAD / NECK
                // ==========================
                applyBonePose(bodyBones.neck, 'neck',
                    gesture.neckX,
                    gesture.neckY,
                    0
                );
                applyBonePose(bodyBones.head, 'head',
                    gesture.headX,
                    gesture.headY,
                    0
                );

                // ==========================
                // APPLY ARMS
                // ==========================
                applyBonePose(bodyBones.leftArm, 'leftArm', 0, 0, gesture.lArmZ);
                applyBonePose(bodyBones.rightArm, 'rightArm', 0, 0, gesture.rArmZ);
                applyBonePose(bodyBones.leftForeArm, 'leftForeArm', gesture.lForeArmX, 0, gesture.lForeArmZ);
                applyBonePose(bodyBones.rightForeArm, 'rightForeArm', gesture.rForeArmX, 0, gesture.rForeArmZ);
                applyBonePose(bodyBones.leftHand, 'leftHand', gesture.lHandX, 0, 0);
                applyBonePose(bodyBones.rightHand, 'rightHand', gesture.rHandX, 0, 0);

                // ==========================
                // APPLY LEGS (breathing only)
                // ==========================
                applyBonePose(bodyBones.leftUpLeg, 'leftUpLeg', 0, 0, breathSin * 0.012);
                applyBonePose(bodyBones.rightUpLeg, 'rightUpLeg', 0, 0, breathSin * 0.012);

                // ==========================
                // APPLY JAW / LIPSYNC
                // ==========================
                const jawAmount = lipSync.smoothed * 0.28; // max jaw open = 0.28 radians (very wide)
                if (jawBone) {
                    jawBone.rotation.x = jawAmount;
                } else {
                    // Try morph targets
                    modelGroup.traverse((child) => {
                        if (child.morphTargetInfluences && child.morphTargetDictionary) {
                            const jawOpenIdx = child.morphTargetDictionary['jawOpen'] 
                                            || child.morphTargetDictionary['mouth_open'] 
                                            || child.morphTargetDictionary['Mouth_Open']
                                            || child.morphTargetDictionary['mouthOpen'];
                            if (jawOpenIdx !== undefined) {
                                child.morphTargetInfluences[jawOpenIdx] = lipSync.smoothed;
                            }
                            // Also try viseme shapes for even better lipsync
                            const visemeAA = child.morphTargetDictionary['viseme_aa'] || child.morphTargetDictionary['visemeAA'];
                            const visemeO = child.morphTargetDictionary['viseme_O'] || child.morphTargetDictionary['visemeO'];
                            if (visemeAA !== undefined) child.morphTargetInfluences[visemeAA] = lipSync.smoothed * 0.7;
                            if (visemeO !== undefined) child.morphTargetInfluences[visemeO] = lipSync.smoothed * 0.5;
                        }
                    });
                }

                // ==========================
                // APPLY BLINKING
                // ==========================
                modelGroup.traverse((child) => {
                    if (child.morphTargetInfluences && child.morphTargetDictionary) {
                        const blinkL = child.morphTargetDictionary['eyeBlinkLeft'] 
                                    || child.morphTargetDictionary['blink_left']
                                    || child.morphTargetDictionary['EyeBlinkLeft'];
                        const blinkR = child.morphTargetDictionary['eyeBlinkRight'] 
                                    || child.morphTargetDictionary['blink_right']
                                    || child.morphTargetDictionary['EyeBlinkRight'];
                        if (blinkL !== undefined) child.morphTargetInfluences[blinkL] = blink.value;
                        if (blinkR !== undefined) child.morphTargetInfluences[blinkR] = blink.value;
                    }
                });
            }

            controls.update();
            renderer.render(scene, camera);
        }

        /* ==========================================
           UI CONTROLS & HANDLERS
        ========================================== */
        const btnFullscreen = document.getElementById('btn-fullscreen');
        const btnSound = document.getElementById('btn-sound');
        const btnMic = document.getElementById('btn-mic');
        const btnCloseLesson = document.getElementById('btn-close-lesson');
        
        let soundEnabled = true;

        btnSound.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            btnSound.classList.toggle('active-state');
            if (!soundEnabled) {
                window.speechSynthesis.cancel();
                isSpeaking = false;
            }
        });

        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                wrapper.requestFullscreen().catch(err => console.warn(err));
            } else {
                document.exitFullscreen();
            }
        });

        btnCloseLesson.addEventListener('click', () => setIdleMode());

        function setTeachingMode() {
            isTeachingMode = true;
            wrapper.classList.add('teaching-mode');
            uiModeBadge.innerText = "TEACHING MODE";
            uiModeBadge.style.background = "rgba(255, 59, 48, 0.1)";
            uiModeBadge.style.color = "var(--danger)";
            document.getElementById('status-text').innerText = "SPEAKING";
        }

        function setIdleMode() {
            isTeachingMode = false;
            wrapper.classList.remove('teaching-mode');
            uiModeBadge.innerText = "IDLE MODE";
            uiModeBadge.style.background = "var(--accent-glow)";
            uiModeBadge.style.color = "var(--accent-color)";
            document.getElementById('status-text').innerText = "IDLE";
            window.speechSynthesis.cancel();
            isSpeaking = false;
        }

        /* ==========================================
           CHAT PIPELINE ENGINE
        ========================================== */
        const chatText = document.getElementById('chat-text');
        const audioWave = document.getElementById('audio-wave');
        const lessonBody = document.getElementById('lesson-body');
        const searchInput = document.getElementById('ai-search-input');
        const btnSendText = document.getElementById('btn-send-text');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isEngineProcessing = false;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                btnMic.classList.add('active-state');
                document.getElementById('status-text').innerText = "LISTENING";
                chatText.innerHTML = currentLangCode === 'hi-IN' ? "सुन रहा हूँ... बोलिए।" : "Listening... Speak now.";
                audioWave.classList.add('listening');
            };

            recognition.onresult = (event) => {
                if (isSpeaking || isEngineProcessing) return;
                const transcript = event.results[0][0].transcript.trim();
                if (transcript.length > 2) {
                    handleUserQuery(transcript);
                }
            };

            recognition.onerror = (e) => { resetMicState(); };
            recognition.onend = () => { resetMicState(); };
        } else {
            chatText.innerHTML = "Your browser doesn't support Voice AI. Please use Chrome.";
        }

        function resetMicState() {
            btnMic.classList.remove('active-state');
            audioWave.classList.remove('listening');
            if (!isEngineProcessing && !isSpeaking) {
                document.getElementById('status-text').innerText = "IDLE";
            }
        }

        btnMic.addEventListener('click', () => {
            if (recognition && !isSpeaking && !isEngineProcessing) {
                try { recognition.start(); } catch(e) {}
            }
        });

        function submitSearchQuery() {
            const query = searchInput.value.trim();
            if (query.length > 0 && !isEngineProcessing && !isSpeaking) {
                searchInput.value = '';
                handleUserQuery(query);
            }
        }

        btnSendText.addEventListener('click', submitSearchQuery);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitSearchQuery();
        });

        async function handleUserQuery(query) {
            isEngineProcessing = true;
            try { recognition.stop(); } catch(e) {}
            
            chatText.innerHTML = `<strong>You:</strong> ${query}`;
            
            setTeachingMode();
            lessonBody.innerHTML = `<span style="color:var(--text-muted); font-size:12px;">Thinking...</span>`;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${GEMINI_API_KEY}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: {
                            parts: [{ text: `You are Mr Amrit, an elite AI virtual teacher. Format responses into a single brief clean actionable explanation paragraph. Do not use asterisks or markdown. Always reply strictly in ${geminiPromptLang} language.` }]
                        },
                        contents: [{ parts: [{ text: query }] }]
                    })
                });

                if (!response.ok) throw new Error("Network Response Fail");
                
                const data = await response.json();
                const aiResponseText = data.candidates[0].content.parts[0].text;
                
                await streamResponseIntoCards(aiResponseText);

            } catch (error) {
                console.error(error);
                chatText.innerHTML = `<strong style="color:var(--danger)">Connection failed. Trying again...</strong>`;
                setIdleMode();
                isEngineProcessing = false;
            }
        }

        async function streamResponseIntoCards(text) {
            lessonBody.innerHTML = "";
            if (soundEnabled) speakText(text);

            const card = document.createElement('div');
            card.className = 'teaching-card';
            lessonBody.appendChild(card);
            
            const tokens = text.split(/(\s+)/);
            let structuredOutput = "";
            
            for (let token of tokens) {
                structuredOutput += token;
                card.innerHTML = structuredOutput;
                lessonBody.scrollTop = lessonBody.scrollHeight;
                await new Promise(resolve => setTimeout(resolve, 35));
            }
        }

        function speakText(text) {
            if (!window.speechSynthesis) {
                isEngineProcessing = false;
                return;
            }
            window.speechSynthesis.cancel();
            try { recognition.stop(); } catch(e) {}

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.lang = currentLangCode;
            
            const voices = window.speechSynthesis.getVoices();
            const chosenVoice = voices.find(v => v.lang.includes(currentLangCode.split('-')[0])) || voices[0];
            if (chosenVoice) utterance.voice = chosenVoice;

            utterance.onstart = () => {
                isSpeaking = true;
                // Reset lipsync state for fresh start
                lipSync.phase1 = Math.random() * Math.PI * 2;
                lipSync.phase2 = Math.random() * Math.PI * 2;
                lipSync.phase3 = Math.random() * Math.PI * 2;
                lipSync.pauseTimer = 1.0 + Math.random() * 1.5;
                lipSync.inPause = false;
                // Trigger first gesture immediately
                gesture.nextGestureTime = 0;
                audioWave.classList.remove('listening');
                audioWave.classList.add('speaking');
            };
            
            utterance.onend = () => {
                isSpeaking = false;
                isEngineProcessing = false;
                audioWave.classList.remove('speaking');
                document.getElementById('status-text').innerText = "IDLE";
                chatText.innerHTML = currentLangCode === 'hi-IN' ? "बोलने के लिए माइक बटन पर क्लिक करें..." : "Click the mic button to speak...";
            };

            utterance.onerror = () => {
                isSpeaking = false;
                isEngineProcessing = false;
                audioWave.classList.remove('speaking');
            };

            window.speechSynthesis.speak(utterance);
        }

        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };
    </script>
</body>
</html>
